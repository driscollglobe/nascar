// daily.js
// Turns a date into a deterministic org season and pack seed. Same date gives
// every player the same org and the same pack order.


// Epoch the streak day count is measured from (UTC).
const DAY_EPOCH = Date.UTC(2026, 0, 1); // 2026-01-01

// UTC date key, the unit the daily is keyed on.
function dateKeyUTC(date = new Date()) {
  const y = date.getUTCFullYear();
  const m = String(date.getUTCMonth() + 1).padStart(2, "0");
  const d = String(date.getUTCDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

// Whole UTC day number since the epoch. Used for the daily number and streak math.
function dayNumber(date = new Date()) {
  const today = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
  return Math.floor((today - DAY_EPOCH) / 86400000);
}

// The seed string the pack builder uses for the day.
function dailySeed(dateKey, orgId) {
  return `${DATA_VERSION}|${dateKey}|${orgId}`;
}

/* ---------------- daily target rotation ----------------
   The target is chosen by a deterministic forward walk from the launch epoch
   (day 0 = 2026-01-01) within the current data version, so the same date always
   resolves to the same target for every player and every caller.

   The picker rotates at the ORG level, not the org-season level, so a dynasty
   that owns many qualifying seasons (Hendrick, Joe Gibbs) does not dominate the
   rotation. Stage 1 picks the org: among the orgs not served in the last few
   dailies, take the least served so far (date-seeded tie-break), which keeps org
   frequency even and independent of how many seasons each org has. Stage 2 picks
   which qualifying season of that org to serve by a deterministic round-robin in
   chronological order: the index is how many times this org was already picked by
   the walk strictly before today, modulo the org's season count, so every season
   of an org gets an exactly equal share of that org's days (no hash variance, no
   starved season). It only ever picks from the list it is given (the eligible
   playable set), so it can never create an unwinnable day or a roster violation.
*/

// Do not repeat an org within this many prior dailies when an alternative exists.
const ORG_WINDOW = 3;

function distinctOrgs(orgSeasons) {
  const seen = [];
  for (const os of orgSeasons) if (!seen.includes(os.org)) seen.push(os.org);
  return seen.sort(); // input-order independent, so the rotation is content-stable
}

function freshRotation(orgSeasons) {
  const orgs = distinctOrgs(orgSeasons);
  const byOrg = new Map(orgs.map((o) => [o, []]));
  for (const os of orgSeasons) byOrg.get(os.org).push(os);
  for (const o of orgs) {
    byOrg.get(o).sort((a, b) => a.year - b.year || (a.id < b.id ? -1 : a.id > b.id ? 1 : 0));
  }
  return { orgs, byOrg, count: new Map(orgs.map((o) => [o, 0])), recent: [], seq: [] };
}

function stepRotation(state, day, dataVersion) {
  const { orgs, byOrg, count, recent } = state;
  // Stage 1: even org rotation. Avoid the last ORG_WINDOW orgs when an alternative
  // exists, then take the least served (date-seeded tie-break) so the long-run
  // frequency is even across orgs regardless of season counts.
  let candidates = orgs.filter((o) => !recent.includes(o));
  if (candidates.length === 0) candidates = orgs.slice();
  const minCount = Math.min(...candidates.map((o) => count.get(o)));
  const least = candidates.filter((o) => count.get(o) === minCount);
  const org = least[hashString(`${dataVersion}|orgpick|${day}`) % least.length];

  // Stage 2: deterministic round-robin over the org's seasons (chronological).
  // The index is how many times this org was already picked strictly before today,
  // so each season gets an exactly equal share of the org's days, with no hash
  // variance and no starved season.
  const seasons = byOrg.get(org);
  const idx = count.get(org) % seasons.length;

  count.set(org, count.get(org) + 1);
  recent.push(org);
  if (recent.length > ORG_WINDOW) recent.shift();
  return seasons[idx];
}

// One walk per (orgSeasons array, data version): cached and extended forward, so
// repeated resolves are cheap and every caller shares the same sequence.
const _rotationCache = new WeakMap();

function pickDailyTarget(orgSeasons, dayNo, dataVersion = DATA_VERSION) {
  if (!orgSeasons || orgSeasons.length === 0 || dayNo < 0) return null;
  let entry = _rotationCache.get(orgSeasons);
  if (!entry || entry.dataVersion !== dataVersion) {
    entry = { dataVersion, state: freshRotation(orgSeasons) };
    _rotationCache.set(orgSeasons, entry);
  }
  const { state } = entry;
  while (state.seq.length <= dayNo) {
    state.seq.push(stepRotation(state, state.seq.length, dataVersion));
  }
  return state.seq[dayNo];
}

// Resolve the full daily context from a date and a list of servable targets.
// Pass only playable targets here. Returns null orgSeason when none are servable
// so the caller can show the pending state instead of a forced deal.
function resolveDaily(orgSeasons, date = new Date()) {
  const dateKey = dateKeyUTC(date);
  const dayNo = dayNumber(date);
  if (!orgSeasons || orgSeasons.length === 0) {
    return { dateKey, dayNo, orgSeason: null, seed: null };
  }
  const orgSeason = pickDailyTarget(orgSeasons, dayNo, DATA_VERSION);
  return { dateKey, dayNo, orgSeason, seed: orgSeason ? dailySeed(dateKey, orgSeason.id) : null };
}


/* ===== src/game/deal.js ===== */
// deal.js
// Builds the pack for a run. The player builds a RIVAL garage to beat the target
// team, not the target team against itself.
//
// Rules:
//   Era matched. Only drivers from the target's season are dealt.
//   The target team's own drivers are excluded from the draft pool, except for a
//   single allowed ANCHOR (the strongest driver on the target roster).
//   So a final lineup can contain at most one target roster driver.
//   Obvious scrub filler is removed: the pack is plausible rival drivers.
//
// The anchor is selected before validation, added to the constrained pool, and
// the pool's max achievable wins are checked against the target. Some big
// winning teams leave so few wins for the field that the day is only winnable
// with the anchor, and a few are not winnable at all (those get dropped by the
// eligibility gate in targets.js).


function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

// Passes are the difficulty lever. A bigger winning team is harder, so it gives
// fewer passes; a more beatable team gives more.
function passesForTarget(orgSeason, cfg = PACK) {
  return orgSeason.benchmarkWins >= cfg.dynastyWins ? cfg.passesDynasty : cfg.passesBeatable;
}

// The rival garage: same season drivers who are NOT on the target roster.
function rivalGarage(orgSeason, pool) {
  const rosterNames = new Set(orgSeason.realRoster.map((r) => r.driver));
  return pool.filter((c) => c.year === orgSeason.year && !rosterNames.has(c.driver));
}

// The single allowed anchor: the strongest driver on the target roster that
// season, as a draftable card tagged with the target team.
function selectAnchor(orgSeason, pool) {
  const best = orgSeason.realRoster.slice().sort((a, b) => b.wins - a.wins)[0];
  if (!best) return null;
  const found = pool.find((c) => c.driver === best.driver && c.year === orgSeason.year);
  return {
    id: found ? found.id : cardId(best.driver, orgSeason.year),
    driver: best.driver,
    year: orgSeason.year,
    team: orgSeason.org,
    wins: best.wins,
    tier: best.tier,
    isAnchor: true,
  };
}

// The single source of truth for whether the rival field can beat the benchmark
// with NO anchor. Top `seats` rival win values, deduped by driver (a real lineup
// holds one card per driver). Both eligibility (targets.js) and buildRun call
// this, so they never decide rival-only vs anchor-used with separate math.
function rivalsOnlyMax(orgSeason, pool) {
  const bestByDriver = new Map();
  for (const c of rivalGarage(orgSeason, pool)) {
    if (!bestByDriver.has(c.driver) || c.wins > bestByDriver.get(c.driver)) bestByDriver.set(c.driver, c.wins);
  }
  const wins = [...bestByDriver.values()].sort((a, b) => b - a);
  return wins.slice(0, orgSeason.seats).reduce((a, b) => a + b, 0);
}

// The strongest single rival card that could be dealt for this target. The pack
// always draws from the rival garage, so its top rival is always a potential
// one-card carry, independent of the rival-only vs anchor-used split. Returns the
// card (or null if there are no rivals). The single-card dominance gate in
// targets.js uses this to drop "sign that one name" days; the anchor's version of
// the same concern is handled separately by ANCHOR_DOMINANT_RATIO.
function strongestRival(orgSeason, pool) {
  let best = null;
  for (const c of rivalGarage(orgSeason, pool)) {
    if (!best || c.wins > best.wins) best = c;
  }
  return best;
}

// Every driver who won a Cup race anywhere in the pool (career wins > 0). Era
// agnostic, so it stays correct when the dataset is extended. Used to keep the
// pack's bluffs to real winners (in any season, including their winless ones)
// rather than career-winless bodies. Memoized per pool object.
const _careerWinnersCache = new WeakMap();
function careerWinnerSet(pool) {
  let set = _careerWinnersCache.get(pool);
  if (set) return set;
  set = new Set();
  for (const c of pool) if (c.wins > 0) set.add(c.driver);
  _careerWinnersCache.set(pool, set);
  return set;
}

// Best lineup wins reachable from the constrained pool (rivals plus the one
// anchor), choosing the top `seats` drivers. The eligibility ceiling.
// Dedup by driver: a real lineup holds one card per driver, so a duplicated
// (driver, year) feed entry must not let this ceiling count the same driver twice
// (the pack builder dedups by name, so a double count here would admit a target
// the dealt pack can never actually reach). Keeps the highest win value per name.
function maxAchievable(orgSeason, pool) {
  const bestByDriver = new Map();
  const consider = (driver, w) => {
    if (!bestByDriver.has(driver) || w > bestByDriver.get(driver)) bestByDriver.set(driver, w);
  };
  for (const c of rivalGarage(orgSeason, pool)) consider(c.driver, c.wins);
  const anchor = selectAnchor(orgSeason, pool);
  if (anchor) consider(anchor.driver, anchor.wins);
  const wins = [...bestByDriver.values()].sort((a, b) => b - a);
  return wins.slice(0, orgSeason.seats).reduce((a, b) => a + b, 0);
}

// Last resort when no seeded shuffle yields a solvable draw: move the strongest
// `seats` cards to the front so they land inside the sign-or-pass window, where a
// player can always reach them. Only reorders the pack, never changes its cards.
function repairWinnableOrder(pack, seats, passes) {
  const windowSize = Math.min(pack.length, seats + passes);
  const winnerIdx = pack
    .map((c, i) => ({ i, wins: c.wins }))
    .sort((a, b) => b.wins - a.wins)
    .slice(0, seats)
    .map((x) => x.i);
  const winnerSet = new Set(winnerIdx);
  const winners = winnerIdx.map((i) => pack[i]);
  const rest = pack.filter((_, i) => !winnerSet.has(i));
  const fillerInWindow = rest.slice(0, Math.max(0, windowSize - winners.length));
  const tail = rest.slice(fillerInWindow.length);
  return winners.concat(fillerInWindow, tail);
}

// Build the run: seats, passes, and the ordered pack drawn from the constrained
// pool (plausible rivals plus the one anchor), validated winnable.
function buildRun(orgSeason, pool, seedStr, cfg = PACK) {
  const seats = orgSeason.seats;
  const passes = passesForTarget(orgSeason, cfg);
  const benchmark = orgSeason.benchmarkWins;

  const rivals = rivalGarage(orgSeason, pool);
  const anchor = selectAnchor(orgSeason, pool);

  // Anchor only when needed (Fix B). The one anchor is offered only if the rival
  // field cannot reach the benchmark on its own. When rivals can win alone, the
  // pack is rival-only with no target-roster driver, so the day is never just
  // "find that one star". Eligibility (targets.js) uses the same rivalsOnlyMax.
  const rivalOnly = rivalsOnlyMax(orgSeason, pool) >= benchmark;
  const activeAnchor = rivalOnly ? null : anchor;

  // Bluffs should be real threats (Fix C): career winners, including their winless
  // seasons, not career-winless bodies. Fill the pack from threats first and top
  // up from backmarkers only if threats cannot fill it. Because tiers are hidden,
  // a real winner in a down year is the plausible bluff we want; the skill is
  // knowing who won THIS season, not just who is a recognizable name.
  const careerWinners = careerWinnerSet(pool);
  const threats = rivals.filter((c) => careerWinners.has(c.driver));
  const backmarkers = rivals.filter((c) => !careerWinners.has(c.driver));

  const target = clamp(seats + passes + (cfg.extra ?? 0), cfg.minSize, cfg.maxSize);
  const need = Math.max(0, target - (activeAnchor ? 1 : 0));

  let fill = shuffle(threats, rngFromSeed(seedStr + "|field")).slice(0, need);
  if (fill.length < need) {
    fill = fill.concat(shuffle(backmarkers, rngFromSeed(seedStr + "|back")).slice(0, need - fill.length));
  }
  let cards = (activeAnchor ? [activeAnchor] : []).concat(fill);

  // Guarantee winnability: while the best seats from the pack fall short of the
  // wins to beat, swap the weakest non anchor card for the strongest rival not in
  // the pack, pulling from threats first. Eligibility already proved the pool can
  // reach it (rival-only or with the anchor), so this resolves.
  const replacements = threats.concat(backmarkers);
  const topSeatsSum = (cs) =>
    cs.map((c) => c.wins).sort((a, b) => b - a).slice(0, seats).reduce((a, b) => a + b, 0);
  let guard = 0;
  while (topSeatsSum(cards) < benchmark && guard++ < 60) {
    const have = new Set(cards.map((c) => c.driver));
    const strongest = replacements
      .filter((r) => !have.has(r.driver))
      .sort((a, b) => (b.wins - a.wins) || ((careerWinners.has(b.driver) ? 1 : 0) - (careerWinners.has(a.driver) ? 1 : 0)))[0];
    if (!strongest) break;
    let wi = -1, wmin = Infinity;
    cards.forEach((c, idx) => { if (!c.isAnchor && c.wins < wmin) { wmin = c.wins; wi = idx; } });
    if (wi < 0 || strongest.wins <= cards[wi].wins) break;
    cards[wi] = strongest;
  }

  // The card SET is winnable (the guard above makes the top seats meet the
  // benchmark), but a given ordered draw under the pass limit can still be
  // impossible to assemble. Order variance is the game ONLY while the day stays
  // solvable: reshuffle until an optimal player could win, and if no seeded order
  // is solvable, repair the order so the winners fall inside the sign-or-pass
  // window. A served daily is never impossible. Passes remain the difficulty lever.
  const winsOf = (cs) => cs.map((c) => c.wins);
  let pack = shuffle(cards, rngFromSeed(seedStr + "|order"));
  let tries = 0;
  let repaired = false;
  while (solveMaxAchievable(winsOf(pack), seats, passes) < benchmark && tries < 80) {
    tries += 1;
    pack = shuffle(cards, rngFromSeed(seedStr + "|order|" + tries));
  }
  if (solveMaxAchievable(winsOf(pack), seats, passes) < benchmark) {
    pack = repairWinnableOrder(pack, seats, passes);
    repaired = true;
  }
  const maxOrdered = solveMaxAchievable(winsOf(pack), seats, passes);
  return {
    orgId: orgSeason.id,
    year: orgSeason.year,
    seats,
    passes,
    pack,
    benchmark,
    maxOrdered,
    winnable: maxOrdered >= benchmark,
    repaired,
    rivalOnly,
    anchor: activeAnchor ? activeAnchor.driver : null,
    rivalDepth: rivals.length,
  };
}


/* ===== src/game/engine.js ===== */
// engine.js
// The interactive run. Holds the live state of a deal and enforces the rules:
// fill every seat, pass only within budget, never pass into an unfillable spot.
// All scoring math lives in scoring.js. This is the state machine around it.


class Engine {
  constructor(run, orgSeason, { onEvent } = {}) {
    this.run = run;
    this.org = orgSeason;
    this.onEvent = onEvent || (() => {});

    this.index = 0; // pointer into the pack
    this.signed = []; // cards drafted, in order
    this.passesUsed = 0;
    this.status = "dealing"; // "dealing" | "done"
    this.result = null;
  }

  get seats() {
    return this.run.seats;
  }
  get passes() {
    return this.run.passes;
  }
  get pack() {
    return this.run.pack;
  }
  get seatsFilled() {
    return this.signed.length;
  }
  get seatsLeft() {
    return this.seats - this.signed.length;
  }
  get passesLeft() {
    return this.passes - this.passesUsed;
  }
  get cardsLeftAfterCurrent() {
    // cards remaining if we move past the current one
    return this.pack.length - (this.index + 1);
  }

  currentCard() {
    if (this.status === "done") return null;
    return this.pack[this.index] || null;
  }

  canSign() {
    return this.status === "dealing" && this.seatsLeft > 0 && !!this.currentCard();
  }

  // A pass is allowed only if there is budget and enough cards remain afterward
  // to still fill every seat. That keeps every reachable state winnable.
  canPass() {
    if (this.status !== "dealing") return false;
    if (this.passesLeft <= 0) return false;
    if (!this.currentCard()) return false;
    return this.cardsLeftAfterCurrent >= this.seatsLeft;
  }

  sign() {
    if (!this.canSign()) return false;
    const card = this.currentCard();
    this.signed.push(card);
    this.onEvent("sign", { card, seatsFilled: this.seatsFilled, index: this.index });
    this.index += 1;
    this._advance();
    return true;
  }

  pass() {
    if (!this.canPass()) return false;
    const card = this.currentCard();
    this.passesUsed += 1;
    this.onEvent("pass", { card, passesUsed: this.passesUsed, index: this.index });
    this.index += 1;
    this._advance();
    return true;
  }

  _advance() {
    if (this.seatsLeft === 0) {
      this._finish();
      return;
    }
    // Out of cards with seats open should be impossible because canPass guards it,
    // but if it ever happens, finish on what we have rather than hang.
    if (this.index >= this.pack.length) {
      this._finish();
    }
  }

  _finish() {
    this.status = "done";
    this.result = scoreRun(this.signed, this.org);
    this.onEvent("complete", { result: this.result, signed: this.signed });
  }

  // A snapshot the UI can render from without reaching into internals.
  snapshot() {
    return {
      status: this.status,
      index: this.index,
      seats: this.seats,
      seatsFilled: this.seatsFilled,
      seatsLeft: this.seatsLeft,
      passes: this.passes,
      passesUsed: this.passesUsed,
      passesLeft: this.passesLeft,
      signed: this.signed.slice(),
      current: this.currentCard(),
      result: this.result,
      packSize: this.pack.length,
    };
  }
}


/* ===== src/game/targets.js ===== */
// targets.js
// The gate that decides whether a target is fit to serve as a daily.
//
// The player builds a RIVAL garage to beat the target, so eligibility is checked
// against the constrained pool (same season drivers minus the target roster, plus
// one anchor). A target is served only if:
//   1. seats >= 2.
//   2. Wins to beat >= MIN_BENCHMARK (the daily gate).
//   3. There are enough real rivals to fill a draft.
//   4. It is mathematically winnable: the best lineup from the constrained pool
//      (top rivals plus the one anchor) reaches the wins to beat. Big winning
//      teams leave few wins for the field, so some are only winnable with the
//      anchor, and any that still fall short are dropped.


const MIN_SEATS = 2;

// Evaluate one target against the pool. Pure. Returns the verdict and why.
function evaluateTarget(orgSeason, pool) {
  const seats = orgSeason.seats;
  const benchmark = orgSeason.benchmarkWins;
  const rivals = rivalGarage(orgSeason, pool);
  const anchor = selectAnchor(orgSeason, pool);
  const topRival = strongestRival(orgSeason, pool); // strongest lone rival card
  const rivalsMax = rivalsOnlyMax(orgSeason, pool); // can the field win with NO anchor?
  const best = maxAchievable(orgSeason, pool); // top seats from rivals + one anchor
  // rivalOnly is the single rival-only vs anchor-used decision, shared with
  // buildRun (both call rivalsOnlyMax), so the two never disagree.
  const rivalOnly = rivalsMax >= benchmark;

  const reasons = [];
  if (seats < MIN_SEATS) {
    reasons.push(`Single seat target. A one car team is never served.`);
  }
  if (benchmark < MIN_BENCHMARK) {
    reasons.push(`Below the daily gate. Won only ${benchmark} ${benchmark === 1 ? "race" : "races"} (need ${MIN_BENCHMARK} or more).`);
  }
  // Need enough rivals to fill the seats without the anchor doing all the work.
  if (rivals.length < seats) {
    reasons.push(`Not enough rival ${orgSeason.year} drivers to field a garage. Has ${rivals.length}.`);
  }
  if (best < benchmark) {
    reasons.push(`Unwinnable. The best rival garage${anchor ? " plus the " + anchor.driver + " anchor" : ""} reaches ${best}, short of ${benchmark}.`);
  }
  // Anchor dominance only matters when the anchor is actually needed. If the rival
  // field can reach the benchmark alone (rivalOnly), the day is served without the
  // anchor, so a dominant driver is never offered and the target is fine.
  if (!rivalOnly && anchor && benchmark > 0 && anchor.wins / benchmark >= ANCHOR_DOMINANT_RATIO) {
    reasons.push(`Anchor dominant. The field cannot reach ${benchmark} without ${anchor.driver}, whose ${anchor.wins} wins are ${Math.round((anchor.wins / benchmark) * 100)} percent of the benchmark, so the day would just be find that driver.`);
  }
  // Single-card dominance. The strongest lone rival is always dealable, so if its
  // own wins are a dominant share of the benchmark the day collapses to "sign that
  // one name". This is the rival-side complement of the anchor gate above; on the
  // rival-only days where these carries live, the anchor gate never fires.
  if (topRival && benchmark > 0 && topRival.wins / benchmark >= MAX_SINGLE_CARD_RATIO) {
    reasons.push(`Single card carry. ${topRival.driver}'s ${topRival.wins} ${topRival.wins === 1 ? "win" : "wins"} alone are ${Math.round((topRival.wins / benchmark) * 100)} percent of the ${benchmark} to beat, so the day would just be sign that one driver.`);
  }

  return {
    id: orgSeason.id,
    playable: reasons.length === 0,
    rivals: rivals.length,
    anchor: anchor ? anchor.driver : null,
    rivalsOnlyMax: rivalsMax,
    maxAchievable: best,
    rivalOnly,
    anchorNeeded: !rivalOnly,
    topRivalWins: topRival ? topRival.wins : 0,
    singleCardRatio: benchmark > 0 && topRival ? topRival.wins / benchmark : 0,
    seats,
    reason: reasons.join(" "),
  };
}

function getPlayableTargets(orgSeasons, pool) {
  return orgSeasons.filter((os) => evaluateTarget(os, pool).playable);
}

// Excluded targets, each paired with the reason, for the flagged pending list.
function getExcludedTargets(orgSeasons, pool) {
  return orgSeasons
    .map((os) => ({ os, verdict: evaluateTarget(os, pool) }))
    .filter((x) => !x.verdict.playable);
}

// Resolve the daily over servable targets only. The date maps onto the servable
// set, so a non servable target is never the daily. When none are servable the
// orgSeason is null and the caller shows the pending state.
function resolveServableDaily(orgSeasons, pool, date = new Date()) {
  const playable = getPlayableTargets(orgSeasons, pool);
  const daily = resolveDaily(playable, date);
  return { ...daily, servableCount: playable.length };
}

// analyze.js
// Difficulty measurement and the shared seed percentile. All pure. No real win
// total is ever changed here. This only measures and simulates.


// Every distinct lineup a player could end up with from one ordered deal, under
// the seat and pass rules. Returns the total wins of each reachable lineup.
// Packs are small (<= 8 cards), so a full enumeration is cheap.
function reachableLineups(packWins, seats, passes) {
  const n = packWins.length;
  const totals = [];
  function rec(i, chosen, sum, passesLeft) {
    if (chosen === seats) {
      totals.push(sum);
      return;
    }
    if (i >= n) return; // cannot fill the seats
    // sign card i
    rec(i + 1, chosen + 1, sum + packWins[i], passesLeft);
    // pass card i, only if there is budget and enough cards remain to still fill
    const seatsLeft = seats - chosen;
    const cardsAfter = n - (i + 1);
    if (passesLeft > 0 && cardsAfter >= seatsLeft) {
      rec(i + 1, chosen, sum, passesLeft - 1);
    }
  }
  rec(0, 0, 0, passes);
  return totals;
}

// Where the player's total ranks among every possible lineup from the same deal.
// Everyone faces the same seed, so this is a fair shared comparison with no
// backend. "You beat X percent of possible lineups from this deal."
function draftPercentile(playerTotal, packWins, seats, passes) {
  const totals = reachableLineups(packWins, seats, passes);
  const n = totals.length;
  if (n === 0) return { beatPct: 0, lineups: 0, best: 0, isBest: false };
  const worse = totals.filter((t) => t < playerTotal).length;
  const best = Math.max(...totals);
  return {
    beatPct: Math.round((worse / n) * 100),
    lineups: n,
    best,
    isBest: playerTotal >= best,
  };
}

// Tiers are hidden before a decision, so "smart" models a knowledgeable fan who
// recognizes the real winners by reputation (their win count). Signs a driver
// who won multiple races on sight, passes the lesser names while passes remain,
// and fills forced seats at the end.
const SMART_WIN_THRESHOLD = 3;
function smartDraft(pack, seats, passes) {
  let seatsLeft = seats;
  let passesLeft = passes;
  const signed = [];
  for (let i = 0; i < pack.length && seatsLeft > 0; i++) {
    const card = pack[i];
    const cardsAfter = pack.length - (i + 1);
    const canPass = passesLeft > 0 && cardsAfter >= seatsLeft;
    const sign = !canPass || card.wins >= SMART_WIN_THRESHOLD;
    if (sign) {
      signed.push(card);
      seatsLeft -= 1;
    } else {
      passesLeft -= 1;
    }
  }
  return signed;
}

// A player with no knowledge: signs or passes at random within the rules.
function randomDraft(pack, seats, passes, rnd = Math.random) {
  let seatsLeft = seats;
  let passesLeft = passes;
  const signed = [];
  for (let i = 0; i < pack.length && seatsLeft > 0; i++) {
    const cardsAfter = pack.length - (i + 1);
    const canPass = passesLeft > 0 && cardsAfter >= seatsLeft;
    const sign = !canPass || rnd() < 0.5;
    if (sign) {
      signed.push(pack[i]);
      seatsLeft -= 1;
    } else {
      passesLeft -= 1;
    }
  }
  return signed;
}

// Run a sweep of dailies and report how smart play and random play do. Smart is
// the number to keep near the target band; random is the floor for a clueless
// player. Tune passes (the difficulty lever) to shape these.
function sweep(orgSeasons, pool, days = 120, start = Date.UTC(2026, 0, 1), cfg = PACK) {
  const playable = getPlayableTargets(orgSeasons, pool);
  const excluded = orgSeasons.length - playable.length;
  if (playable.length === 0) {
    return {
      days: 0, playableTargets: 0, excludedTargets: excluded,
      smartWinRate: null, randomWinRate: null, victoryLaneRate: null, missRate: null,
      unwinnable: 0, repaired: 0,
      byBand: {}, byDecade: {}, target: DIFFICULTY, inTargetBand: false,
      note: "No servable targets under the current gate and winnability rules.",
    };
  }

  let smartWins = 0, randomWins = 0, victoryLanes = 0, misses = 0, unwinnable = 0, repaired = 0;
  const byBand = {};
  const byDecade = {};

  for (let day = 0; day < days; day++) {
    const d = new Date(start + day * 86400000);
    const daily = resolveDaily(playable, d);
    const run = buildRun(daily.orgSeason, pool, daily.seed, cfg);

    if (!run.winnable) unwinnable += 1;
    if (run.repaired) repaired += 1;

    const smart = scoreRun(smartDraft(run.pack, run.seats, run.passes), daily.orgSeason);
    const random = scoreRun(randomDraft(run.pack, run.seats, run.passes), daily.orgSeason);

    if (smart.win) smartWins += 1;
    if (random.win) randomWins += 1;
    if (smart.outcome === OUTCOME.VICTORY_LANE) victoryLanes += 1;
    if (smart.outcome === OUTCOME.MISS) misses += 1;

    const b = difficultyBand(daily.orgSeason.benchmarkWins);
    byBand[b] = byBand[b] || { n: 0, win: 0, vl: 0 };
    byBand[b].n += 1;
    if (smart.win) byBand[b].win += 1;
    if (smart.victoryLane) byBand[b].vl += 1;

    // Era skew: how often each decade is the daily, to catch one decade dominating.
    const decade = Math.floor(daily.orgSeason.year / 10) * 10;
    byDecade[decade] = (byDecade[decade] || 0) + 1;
  }

  const smartWinRate = smartWins / days;
  return {
    days,
    playableTargets: playable.length,
    excludedTargets: excluded,
    smartWinRate,
    randomWinRate: randomWins / days,
    victoryLaneRate: victoryLanes / days,
    missRate: misses / days,
    unwinnable,
    repaired,
    byBand,
    byDecade,
    target: DIFFICULTY,
    inTargetBand: smartWinRate >= DIFFICULTY.targetWinRateLow && smartWinRate <= DIFFICULTY.targetWinRateHigh,
  };
}


/* ===== src/game/leaderboard.js ===== */
// leaderboard.js
// The daily board, built on the shared seed. Every player on a date faces the
// exact same deal, so the full field of garages reachable from that deal is
// identical for everyone. That makes a fair, comparable board with no backend:
// we rank the player among every garage the deal allows and report the ceiling.
//
// This is distinct from the live "you versus other real players" percentile,
// which needs the results service (see data/comparison.js). The shared seed board
// ships today; the live percentile drops in on top of it when the service exists.


// Build the board for one deal. packWins/seats/passes describe the deal; pass the
// player's final total as opts.playerTotal to also place them on the board.
// Returns the field size, the ceiling (best reachable total), the floor, the
// median, and (when a player total is given) their rank and percentile.
function dailyBoard(packWins, seats, passes, opts = {}) {
  const totals = reachableLineups(packWins, seats, passes).slice().sort((a, b) => a - b);
  const n = totals.length;
  if (n === 0) {
    return { lineups: 0, best: 0, worst: 0, median: 0, player: null };
  }

  const best = totals[n - 1];
  const worst = totals[0];
  const median = totals[Math.floor((n - 1) / 2)];

  const board = { lineups: n, best, worst, median, player: null };

  if (typeof opts.playerTotal === "number") {
    const total = opts.playerTotal;
    const better = totals.filter((t) => t > total).length; // garages that beat the player
    const worse = totals.filter((t) => t < total).length; // garages the player beat
    board.player = {
      total,
      rank: better + 1, // 1 = top of the board (no garage beats it)
      beatPct: Math.round((worse / n) * 100),
      isBest: total >= best,
    };
  }

  return board;
}

// storage.js
// Career stats, streaks, and the results distribution. Backed by localStorage,
// with an in memory fallback so the embed never breaks if storage is blocked.
// Only the first scored run on a given daily counts, which keeps the streak honest.


const KEY = "lineup:v1";

const _mem = {};
function safeGet(k) {
  try {
    return window.localStorage.getItem(k);
  } catch {
    return _mem[k] ?? null;
  }
}
function safeSet(k, v) {
  try {
    window.localStorage.setItem(k, v);
  } catch {
    _mem[k] = v;
  }
}

function freshStats() {
  return {
    dataVersion: DATA_VERSION,
    totalPlays: 0,
    wins: 0,
    victoryLanes: 0,
    misses: 0,
    currentStreak: 0,
    maxStreak: 0,
    bestDiff: null, // best total minus benchmark across all plays
    bestTotal: 0,
    lastDayNo: null,
    distribution: { VICTORY_LANE: 0, WIN: 0, MISS: 0 },
    daily: {}, // dateKey -> record
  };
}

function getStats() {
  const raw = safeGet(KEY);
  if (!raw) return freshStats();
  try {
    const parsed = JSON.parse(raw);
    return { ...freshStats(), ...parsed };
  } catch {
    return freshStats();
  }
}

function save(stats) {
  safeSet(KEY, JSON.stringify(stats));
}

function hasPlayed(dateKey) {
  return !!getStats().daily[dateKey];
}

function getDailyRecord(dateKey) {
  return getStats().daily[dateKey] || null;
}

// Record a scored daily run. Idempotent per dateKey: a replay does not move the
// streak or the totals. Returns the up to date stats. `extra` carries optional
// fields to remember, like the shared seed draft percentile.
function recordDaily(dateKey, dayNo, result, extra = {}) {
  const stats = getStats();
  if (stats.daily[dateKey]) return stats; // already counted this day

  const win = result.outcome !== OUTCOME.MISS;

  // Streak is consecutive daily wins. A miss or a skipped day resets it.
  if (win) {
    if (stats.lastDayNo !== null && dayNo === stats.lastDayNo + 1 && stats.currentStreak > 0) {
      stats.currentStreak += 1;
    } else {
      stats.currentStreak = 1;
    }
  } else {
    stats.currentStreak = 0;
  }
  stats.lastDayNo = dayNo;
  stats.maxStreak = Math.max(stats.maxStreak, stats.currentStreak);

  stats.totalPlays += 1;
  if (result.outcome === OUTCOME.VICTORY_LANE) stats.victoryLanes += 1;
  if (result.outcome === OUTCOME.WIN) stats.wins += 1;
  if (result.outcome === OUTCOME.MISS) stats.misses += 1;
  stats.distribution[result.outcome] += 1;

  if (stats.bestDiff === null || result.diff > stats.bestDiff) stats.bestDiff = result.diff;
  stats.bestTotal = Math.max(stats.bestTotal, result.total);

  stats.daily[dateKey] = {
    dayNo,
    outcome: result.outcome,
    total: result.total,
    benchmark: result.benchmark,
    diff: result.diff,
    beatPct: extra.beatPct ?? null,
    ts: Date.now(),
  };

  save(stats);
  return stats;
}

// Wins counts Victory Lanes too (a Victory Lane is a win).
function winRate(stats = getStats()) {
  if (stats.totalPlays === 0) return 0;
  return (stats.wins + stats.victoryLanes) / stats.totalPlays;
}

function resetStats() {
  save(freshStats());
}

// analytics.js
// One thin event bus for the moments the audience team measures. Pushes to a
// dataLayer if the host page has one, keeps an in memory log for tests, and is a
// no op everywhere else. The funnel mirrors Two Seats: every event is stamped
// with the data version so the audience team can segment by dataset, and a
// page_view fires on each screen.


const EVENTS = new Set([
  "page_view",
  "game_start",
  "deal",
  "sign",
  "pass",
  "tally",
  "result",
  "share",
  "mode_switch",
]);

const _log = [];

function track(event, props = {}) {
  if (!EVENTS.has(event)) {
    console.warn(`Unknown analytics event "${event}".`);
  }
  const payload = { event, dataVersion: DATA_VERSION, ts: Date.now(), ...props };
  _log.push(payload);

  // Hand off to the host page if it exposes a dataLayer (GTM style).
  try {
    if (typeof window !== "undefined") {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ game: "the-lineup", ...payload });
    }
  } catch {
    /* analytics must never break the game */
  }
}

function getEventLog() {
  return _log.slice();
}

function clearEventLog() {
  _log.length = 0;
}

      text: label,
      "aria-current": String(active === key),
      onClick: () => {

        track("mode_switch", { to: key });
        if (key === "home") renderHome();
        else if (key === "archive") renderArchive();
        else if (key === "stats") renderStats();
      },

  return el("header", { class: "topbar" }, [
    brandSlot(),
    el("nav", { class: "nav", "aria-label": "Sections" }, [

      navBtn("stats", "Stats"),
      el("button", { class: "help", "aria-label": "How to play", title: "How to play", text: "?", onClick: () => openHowTo() }),
    ]),
  ]);
}

// Official logo slot. If a logo file exists at LOGO.src it renders here. Until
// then the text wordmark is the placeholder. Drop a file at the path (and rerun
// build.py for the embed) and it swaps in with no code change.
function brandSlot() {
  // The official mark sits as a badge to the left of the game name. If the file
  // is missing the badge is removed and the wordmark stands alone.
  const badge = el("img", {
    class: "brand-badge",
    src: LOGO.src,
    alt: LOGO.alt,
    onError: () => badge.remove(),
  });
  const wordmark = el("span", { class: "wordmark", text: "THE LINEUP" });
  const dot = el("span", { class: "dot display", text: "●" });
  return el("div", { class: "brand logo-slot", "data-logo-slot": "motorsport" }, [badge, wordmark, dot]);
}

function footer() {
  const integ = App.data.integrity;
  const kids = [
    el("div", { text: `Real NASCAR data from Motorsport Stats. ${DATA_VERSION}.` }),
  ];
  if (integ && !integ.ok) {
    kids.push(
      el("div", { class: "unverified", text: `${integ.problems.length} number(s) to confirm on the data swap.` })
    );
  }
  return el("footer", { class: "foot" }, kids);
}

function setScreen(name, ...children) {
  App.screen = name;
  detachKeys();
  track("page_view", { screen: name });
  const frag = el("div", { class: "stack grow" }, children);
  clear(App.root);
  // The page reads brand -> content -> ad -> footer, like the Two Seats band

  // the card the player is deciding on.
  const ad = name === "deal" ? null : adSlot();

      el("div", { class: "muted", style: "font-size:12px", text: `Daily #${daily.dayNo}` }),
    ]),
    el("div", { class: "lede", text: `Build a Cup garage from one season. You get ${passes} ${passes === 1 ? "pass" : "passes"}. Beat the real team's win total.` }),
    benchmarkHero(daily.orgSeason),
  ];

  if (!played) {
    children.push(
      el("button", {
        class: "btn primary",
        style: "margin-top:14px",
        text: "Play today",
        onClick: () => startRun(daily.orgSeason, "daily", daily),
      })
    );
  } else {
    const rec = getDailyRecord(daily.dateKey);
    children.push(playedSummary(rec, boardForDaily(daily, rec.total)));
    children.push(
      el("div", { class: "actions", style: "margin-top:10px" }, [
        el("button", { class: "btn ghost", text: "Archive", onClick: () => renderArchive() }),
        el("button", { class: "btn ghost", text: "Stats", onClick: () => renderStats() }),
      ])
    );
  }

  setScreen("home", ...children);
  announce(`Today's team to beat. ${daily.orgSeason.year} ${daily.orgSeason.org}. ${daily.orgSeason.benchmarkWins} wins to beat.`);
}

// The pending state. No target is fit to serve, so there is no daily. We say so
// plainly and list what each target needs. Targets unlock the moment the
// verified data gives them real rival drivers.
function renderNoDaily() {
  const excluded = getExcludedTargets(App.data.orgSeasons, App.data.pool);
  setScreen(
    "home",
    el("div", { class: "checker" }),
    el("div", { class: "benchmark", style: "margin-top:6px" }, [
      el("div", { class: "label", text: "No daily yet" }),
      el("div", { class: "org", style: "font-size:24px", text: "Pending verified data" }),
      el("div", { class: "lede", style: "margin:10px 0 0", text: "A target is only served when its season offers a real draft: rival drivers to choose from, and a real chance to miss. None qualify yet. No forced lineups, no dynasty against itself." }),
    ]),
    excludedList(excluded),
    el("div", { class: "actions", style: "margin-top:12px" }, [
      el("button", { class: "btn ghost", text: "Archive", onClick: () => renderArchive() }),
      el("button", { class: "btn ghost", text: "Stats", onClick: () => renderStats() }),
    ])
  );
  announce("No daily yet. Targets are pending verified data.");
}

// Locked seasons are collapsed behind a short explanation, not listed in full.
function excludedList(excluded) {
  if (!excluded.length) return null;
  return el("details", { class: "locked-note" }, [
    el("summary", { text: "Why are some seasons locked?" }),
    el("div", { class: "lede", style: "margin-top:8px" , text:
      `${excluded.length} team seasons are not served as dailies. A season is locked when it is below the ${MIN_BENCHMARK} win gate, has too few rival drivers to field a garage, or cannot be beaten by a rival garage plus one anchor.` }),
  ]);
}

function playedSummary(rec, board) {
  const v = {
    [OUTCOME.VICTORY_LANE]: { cls: "victory", word: "Victory Lane" },
    [OUTCOME.WIN]: { cls: "win", word: "Win" },
    [OUTCOME.MISS]: { cls: "miss", word: "Miss" },
  }[rec.outcome];
  const stats = getStats();
  return el("div", {}, [
    el("div", { class: "section-title", text: "Today, done" }),
    el("div", { class: `banner ${v.cls}` }, [
      el("div", { class: "verdict", text: v.word }),
      el("div", { class: "sub", text: `You drafted ${rec.total} against ${rec.benchmark} to beat.` }),
    ]),
    rec.beatPct !== null && rec.beatPct !== undefined
      ? el("div", { class: "pct", style: "margin:8px 0" }, [
          el("span", { class: "pct-k", text: "Shared seed rating" }),
          el("span", { class: "pct-v", text: `Beat ${rec.beatPct} percent of possible lineups.` }),
        ])
      : null,
    leaderboardBlock(board, rec.benchmark),
    el("div", { class: "lede", text: `Streak ${stats.currentStreak}. Come back tomorrow for a new team to beat.` }),
    distributionBlock(stats),
  ]);
}

/* ---------------- the deal ---------------- */

function startRun(orgSeason, mode, daily) {
  const seed =
    mode === "daily"
      ? daily.seed
      : `archive|${orgSeason.id}|${Math.floor(Math.random() * 1e9)}`;
  const run = buildRun(orgSeason, App.data.pool, seed);

  App.engine = new Engine(run, orgSeason, {
    onEvent: (type, payload) => {
      if (type === "sign") track("sign", { driver: payload.card.driver, tier: payload.card.tier, mode });
      else if (type === "pass") track("pass", { driver: payload.card.driver, mode });
    },
  });
  App.runCtx = { orgSeason, run, mode, daily };

  track("game_start", { org: orgSeason.id, mode, band: difficultyBand(orgSeason.benchmarkWins), seats: run.seats });
  track("deal", { org: orgSeason.id, packSize: run.pack.length, passes: run.passes, mode });

  renderDeal();
}

function renderDeal() {
  const eng = App.engine;
  const os = App.runCtx.orgSeason;

  // Hero: the team to beat and the wins to beat stay visible the whole deal.
  const hero = el("section", { class: "benchmark", style: "padding:12px 14px" }, [
    el("div", { class: "row spread" }, [
      el("div", {}, [
        el("div", { class: "label", text: "Wins to beat" }),
        el("div", { class: "org", style: "font-size:21px", text: `${os.year} ${os.org}` }),
      ]),
      el("div", { class: "num", style: "font-size:46px;color:var(--amber);line-height:0.85", text: String(os.benchmarkWins) }),
    ]),
  ]);

  // The garage: every seat is shown at all times, Open until filled.
  const lineup = el("div", { class: "lineup", id: "lineup" });
  const passesRow = el("div", { class: "passes", id: "passesRow" });
  const passesWrap = el("div", { class: "row spread", style: "margin:2px 0 6px" }, [
    el("div", { class: "label muted", style: "font-size:11px;letter-spacing:.1em;text-transform:uppercase", text: "Your garage" }),
    el("div", { class: "row", style: "gap:8px" }, [
      el("span", { class: "label muted", style: "font-size:11px;letter-spacing:.1em;text-transform:uppercase", text: "Passes" }),
      passesRow,
    ]),
  ]);

  const stage = el("div", { class: "stage", id: "stage" });

  const signBtn = el("button", { class: "btn sign", id: "signBtn", text: "Sign" });
  const passBtn = el("button", { class: "btn pass", id: "passBtn", text: "Pass" });
  signBtn.addEventListener("click", () => doAction("sign"));
  passBtn.addEventListener("click", () => doAction("pass"));
  const actions = el("div", { class: "actions" }, [signBtn, passBtn]);

  const hint = el("div", { class: "hintline", id: "hint" });

  setScreen("deal", el("div", { class: "checker thin" }), hero, stage, actions, hint, passesWrap, lineup);

  attachKeys();
  paintStatus();
  dealCurrentCard(false);
}

function paintStatus() {
  const eng = App.engine;
  const lineupEl = document.getElementById("lineup");
  const passesRow = document.getElementById("passesRow");
  clear(lineupEl);
  for (let i = 0; i < eng.seats; i++) {
    mount(lineupEl, lineupSeat(i, eng.signed[i]));
  }
  clear(passesRow);
  for (let i = 0; i < eng.passes; i++) {
    const spent = i < eng.passesUsed;
    mount(passesRow, el("span", { class: "pip " + (spent ? "spent" : "left") }));
  }

  const signBtn = document.getElementById("signBtn");
  const passBtn = document.getElementById("passBtn");
  if (signBtn) signBtn.disabled = !eng.canSign();
  if (passBtn) passBtn.disabled = !eng.canPass();

  const hint = document.getElementById("hint");
  if (hint) {
    if (!eng.canPass() && eng.passesLeft <= 0) {
      hint.innerHTML = `No passes left. Fill your seats. <kbd>S</kbd> sign`;
    } else if (!eng.canPass()) {
      hint.innerHTML = `Pass closed. You need every card left to fill the seats. <kbd>S</kbd> sign`;
    } else {
      hint.innerHTML = `<kbd>S</kbd> sign &nbsp; <kbd>P</kbd> pass`;
    }
  }
}

function dealCurrentCard(skipAnim) {
  const eng = App.engine;
  const stage = document.getElementById("stage");
  clear(stage);
  const card = eng.currentCard();
  if (!card) return;
  const node = driverCard(card, { dealing: !skipAnim });
  mount(stage, node);
  if (!skipAnim) sound.deal();
  announce(`${card.driver}, ${card.year}, ${card.team || ""}. Tier hidden. ${eng.seatsLeft} ${eng.seatsLeft === 1 ? "seat" : "seats"} open. ${eng.passesLeft} ${eng.passesLeft === 1 ? "pass" : "passes"} left. Sign or pass.`);
}

// Reveal the tier on the card the moment it is decided, before it leaves.
function revealCardTier(cardNode, card, action) {
  if (!cardNode) return;
  const t = tierMeta(card.tier);
  const q = cardNode.querySelector(".hide .q");
  const k = cardNode.querySelector(".hide .k");
  if (q) { q.textContent = t.label; q.style.color = t.color; q.style.fontSize = "20px"; }
  if (k) k.textContent = action === "sign" ? "Signed" : "Passed";
  cardNode.classList.add("revealed");
  announce(`${card.driver} is ${t.label}.`);
}

function doAction(kind) {
  const eng = App.engine;
  if (kind === "sign" && !eng.canSign()) return;
  if (kind === "pass" && !eng.canPass()) return;

  if (kind === "sign") sound.sign();
  else sound.pass();

  const stage = document.getElementById("stage");
  const cardNode = stage && stage.querySelector(".card");
  const reduced = prefersReducedMotion();
  const decided = eng.currentCard();

  // Reveal the tier immediately on decision (item 1: reveal after sign or pass).
  revealCardTier(cardNode, decided, kind);

  const apply = () => {
    if (kind === "sign") eng.sign();
    else eng.pass();
    if (eng.status === "done") {
      showResult();
    } else {
      paintStatus();
      dealCurrentCard(false);
    }
  };

  if (reduced || !cardNode) {
    apply();
  } else {
    cardNode.classList.add("leaving");
    setTimeout(apply, 420); // let the revealed tier read before the card leaves
  }
}

/* ---------------- result / reveal ---------------- */

function showResult() {
  const eng = App.engine;
  const { orgSeason, mode, daily } = App.runCtx;
  const result = eng.result;

  track("tally", { org: orgSeason.id, total: result.total, benchmark: result.benchmark, mode });

  // Shared seed rating: where this draft ranks among every possible lineup from
  // the same deal. Honest, computable, no backend.
  const run = App.runCtx.run;
  const percentile = draftPercentile(result.total, run.pack.map((c) => c.wins), run.seats, run.passes);

  let streak = 0;
  if (mode === "daily" && daily) {
    const stats = recordDaily(daily.dateKey, daily.dayNo, result, { beatPct: percentile.beatPct });
    streak = stats.currentStreak;
  } else {
    streak = getStats().currentStreak;
  }

  track("result", { org: orgSeason.id, outcome: result.outcome, diff: result.diff, mode, streak });

  // Live player percentile is a flagged seam until the results service exists.
  // The reveal shows the pending flag now and swaps in the live number if and
  // when the service answers. submit and fetch are no ops until RESULTS_ENDPOINT
  // is configured (see data/comparison.js), so today this stays on the pending
  // flag and the shared seed board carries the comparison.
  const seed = daily ? daily.seed : run.orgId;
  const view = buildResultView({
    signed: eng.signed,
    result,
    orgSeason,
    sound,
    percentile,
    comparison: { connected: false },
  });
  const { node, play } = view;

  if (mode === "daily") submitDailyResult(seed, result, { dayNo: daily ? daily.dayNo : null });
  getDailyComparison(seed, result).then((c) => {
    App.runCtx.comparison = c;
    view.setComparison(c);
  });

  const shareCtx = {
    dayNo: daily ? daily.dayNo : null,
    org: orgSeason.org,
    year: orgSeason.year,
    result,
    signed: eng.signed,
    dynastyRoster: orgSeason.realRoster,
    percentile,
    streak,
    mode,
  };

  const actions = el("div", { class: "stack", style: "gap:10px;margin-top:16px" }, [
    el("button", {
      class: "btn primary",
      text: "Share result",
      onClick: async () => {
        const text = buildShareText(shareCtx);
        const how = await shareOrCopy(text);
        track("share", { outcome: result.outcome, how, mode });
        toast(how === "manual" ? "Copy not available. Select the text." : "Copied to share.");
        if (how === "manual") showShareFallback(text);
      },
    }),
    el("div", { class: "actions" }, [
      el("button", { class: "btn ghost", text: "Archive", onClick: () => renderArchive() }),
      el("button", { class: "btn ghost", text: mode === "daily" ? "Daily" : "Home", onClick: () => renderHome() }),
    ]),
    // The daily board only frames as shared when the seed is shared, so it shows
    // for the daily, not for unranked archive runs.
    mode === "daily"
      ? leaderboardBlock(
          dailyBoard(run.pack.map((c) => c.wins), run.seats, run.passes, { playerTotal: result.total }),
          result.benchmark
        )
      : null,
    distributionBlock(getStats()),
  ]);

  setScreen("result", el("div", { class: "checker" }), node, actions);
  play();
}

function showShareFallback(text) {
  const host = document.querySelector(".result");
  if (!host) return;
  mount(host, el("pre", { class: "share-pre", text }));
}

/* ---------------- archive ---------------- */

function renderArchive() {
  // Archive serves the same gate as the daily. Only servable targets are
  // playable. The rest are shown as pending, flagged, and not clickable.
  const playable = getPlayableTargets(App.data.orgSeasons, App.data.pool)
    .slice()
    .sort((a, b) => b.year - a.year);
  const excluded = getExcludedTargets(App.data.orgSeasons, App.data.pool)
    .sort((a, b) => b.os.year - a.os.year);

  const list = playable.length
    ? el("ul", { class: "archive-list" },
        playable.map((os) => {
          const band = bandMeta(difficultyBand(os.benchmarkWins));
          return el("li", {
            tabindex: "0",
            role: "button",
            "aria-label": `${os.year} ${os.org}. ${os.benchmarkWins} wins to beat. ${band.label}.`,
            onClick: () => startRun(os, "archive", null),
            onKeydown: (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); startRun(os, "archive", null); } },
          }, [
            el("div", {}, [
              el("div", { class: "a-org", text: `${os.year} ${os.org}` }),
              el("div", { class: "a-meta" }, [
                el("span", { class: "tag", style: `color:${band.color};font-size:10px`, text: band.label }),
                el("span", { text: ` ${os.seats} ${os.seats === 1 ? "seat" : "seats"}` }),
              ]),
            ]),
            el("div", { class: "a-bench", text: String(os.benchmarkWins) }),
          ]);
        })
      )
    : el("div", { class: "seam-flag", text: "No servable targets yet. Each needs real rival drivers from its season before it can be played." });

  setScreen("archive",
    el("div", { class: "checker thin" }),
    el("div", { class: "section-title", text: "Archive" }),
    el("div", { class: "lede", text: "Any servable team season, unlimited, unranked. These runs never touch your streak." }),
    list,
    excludedList(excluded)
  );
}

/* ---------------- daily board (shared seed) ---------------- */

function ordinal(n) {
  const s = ["th", "st", "nd", "rd"];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// The shared seed daily board. Every player on a date faces the same deal, so the
// field of garages it allows is the same for everyone. We rank the player against
// that field. This is the honest, backend free leaderboard; the live versus
// other players percentile is a separate seam (see comparison.js).
function leaderboardBlock(board, benchmark) {
  if (!FEATURES.leaderboard || !board || board.lineups <= 1) return null;
  const p = board.player;
  const row = (k, v, cls) =>
    el("div", { class: "board-row" + (cls ? " " + cls : "") }, [
      el("span", { class: "board-k", text: k }),
      el("span", { class: "board-v num", text: String(v) }),
    ]);
  const rows = [row("Best possible garage", board.best, "ceiling")];
  if (typeof benchmark === "number") rows.push(row("Wins to beat", benchmark));
  if (p) rows.push(row("Your garage", p.total, "you"));

  const standing = p
    ? p.isBest
      ? "Top of the board. No garage from this deal could beat yours."
      : `You rank ${ordinal(p.rank)} of ${board.lineups} possible garages, ahead of ${p.beatPct} percent of the field.`
    : `${board.lineups} garages are possible from today's deal.`;

  return el("div", { class: "board" }, [
    el("div", { class: "section-title", text: "Daily board" }),
    el("div", { class: "lede", style: "margin:2px 0 8px", text: "Shared seed. Everyone gets the same deal today, so this board is the same for everyone." }),
    el("div", { class: "board-rows" }, rows),
    el("div", { class: "board-standing", text: standing }),
  ]);
}

// Rebuild the deterministic board for a played daily from its seed. buildRun is a
// pure function of the seed, so this reconstructs the exact deal the player saw.
function boardForDaily(daily, playerTotal) {
  if (!FEATURES.leaderboard || !daily || !daily.orgSeason || !daily.seed) return null;
  const run = buildRun(daily.orgSeason, App.data.pool, daily.seed);
  return dailyBoard(run.pack.map((c) => c.wins), run.seats, run.passes, { playerTotal });
}

/* ---------------- stats ---------------- */

function distributionBlock(stats) {
  const d = stats.distribution;
  const max = Math.max(1, d.VICTORY_LANE, d.WIN, d.MISS);
  const bar = (lbl, cls, n) =>
    el("div", { class: "bar" }, [
      el("span", { class: "lbl", text: lbl }),
      el("div", { class: "track" }, [
        el("div", { class: `fill ${cls}`, style: `width:${Math.max(8, (n / max) * 100)}%`, text: String(n) }),
      ]),
    ]);
  return el("div", {}, [
    el("div", { class: "section-title", text: "Results distribution" }),
    el("div", { class: "dist" }, [
      bar("Victory", "victory", d.VICTORY_LANE),
      bar("Win", "win", d.WIN),
      bar("Miss", "miss", d.MISS),
    ]),
  ]);
}

function renderStats() {
  const s = getStats();
  const wr = Math.round(winRate(s) * 100);
  const cell = (v, k) => el("div", { class: "cell" }, [el("div", { class: "v num", text: String(v) }), el("div", { class: "k", text: k })]);

  setScreen("stats",
    el("div", { class: "checker thin" }),
    el("div", { class: "section-title", text: "Career" }),
    el("div", { class: "statgrid" }, [
      cell(s.totalPlays, "Played"),
      cell(`${wr}%`, "Win rate"),
      cell(s.victoryLanes, "Victory Lanes"),
      cell(s.currentStreak, "Streak"),
      cell(s.maxStreak, "Best streak"),
      cell(s.bestDiff === null ? "0" : (s.bestDiff >= 0 ? `+${s.bestDiff}` : s.bestDiff), "Best run"),
    ]),
    distributionBlock(s),
    el("div", { class: "lede", style: "margin-top:14px", text: FEATURES.leaderboard ? "Daily board is live. The shared seed ranks you against every garage today's deal allows." : "The daily uses a shared seed, so a daily leaderboard drops in cleanly." })
  );
}

/* ---------------- keyboard ---------------- */

function attachKeys() {
  detachKeys();
  App.keyHandler = (e) => {
    if (App.screen !== "deal") return;
    const k = e.key.toLowerCase();
    if (k === "s" || k === "enter") { e.preventDefault(); doAction("sign"); }
    else if (k === "p" || k === "backspace") { e.preventDefault(); doAction("pass"); }
  };
  document.addEventListener("keydown", App.keyHandler);
}
function detachKeys() {
  if (App.keyHandler) {
    document.removeEventListener("keydown", App.keyHandler);
    App.keyHandler = null;
  }
}

/* ---------------- error ---------------- */

function renderError(err) {
  clear(App.root);
  mount(App.root,
    topbar("home"),
    el("div", { class: "benchmark", style: "margin-top:20px" }, [
      el("div", { class: "org", text: "Data did not load" }),
      el("div", { class: "lede", text: String(err && err.message ? err.message : err) }),
    ])
  );
}

if (typeof window !== "undefined") {
  // Inspection hook for local debugging and automated checks. Off in production.
  // Turns on with the DEBUG config flag or the ?debug=1 query parameter.
  const debugOn = DEBUG || /[?&]debug=1\b/.test(window.location.search);
  if (debugOn) window.__LINEUP_APP__ = App;
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
}


})();
  </script>
