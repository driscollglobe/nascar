  <title>The Lineup</title>
  <meta name="description" content="The Lineup. A daily NASCAR draft game. Read the pack, fill the seats, beat the dynasty." />

  <style>
/* tokens.css
   The Two Seats design language. Inherited exactly so The Lineup reads as family. */

:root {
  /* Surfaces */
  --bg: #0d1117;
  --panel: #161c24;
  --panel2: #1d2530;
  --raised: #222c38;

  /* Lines */
  --line: #28323f;
  --line2: #34404f;

  /* Text */
  --text: #eef2f6;
  --muted: #8a97a8;
  --faint: #5c6776;

  /* Accents */
  --amber: #f2e500;
  --amber2: #fff44d;
  --green: #37d99a;
  --red: #ff5d6c;
  --cyan: #3fd8e2;

  /* Type */
  --display: "Barlow Condensed", "Oswald", "Arial Narrow", system-ui, sans-serif;
  --body: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

  /* Geometry */
  --radius: 14px;
  --radius-sm: 9px;
  --gap: 14px;
  --maxw: 460px;

  /* Motion */
  --deal-ms: 420ms;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);

  /* Checkered family mark */
  --check: repeating-conic-gradient(var(--text) 0% 25%, var(--bg) 0% 50%) 0 0 / 12px 12px;
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --deal-ms: 0ms;
  }
}

/* app.css
   Mobile first. The card and the running win total versus the benchmark are the
   hero. Everything else stays quiet. */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
}

#app {
  max-width: var(--maxw);
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 16px env(safe-area-inset-bottom) 16px;
}

/* ----- shared atoms ----- */
.display { font-family: var(--display); text-transform: uppercase; letter-spacing: 0.01em; }
.num { font-family: var(--display); font-weight: 700; font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); }
.faint { color: var(--faint); }
.center { text-align: center; }
.row { display: flex; align-items: center; gap: 10px; }
.spread { justify-content: space-between; }
.stack { display: flex; flex-direction: column; }
.grow { flex: 1; }
.hidden { display: none !important; }

.checker {
  height: 8px;
  background: var(--check);
  border-radius: 2px;
  opacity: 0.9;
}
.checker.thin { height: 6px; opacity: 0.7; }

.btn {
  font-family: var(--display);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  font-size: 19px;
  border: 1px solid var(--line2);
  background: var(--raised);
  color: var(--text);
  border-radius: var(--radius);
  padding: 16px 18px;
  cursor: pointer;
  transition: transform 120ms var(--ease), background 120ms, border-color 120ms, opacity 120ms;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: translateY(1px) scale(0.99); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:focus-visible { outline: 3px solid var(--cyan); outline-offset: 2px; }

.btn.primary {
  background: var(--amber);
  border-color: var(--amber);
  color: #14110a;
}
.btn.primary:hover { background: var(--amber2); }
.btn.sign { background: var(--amber); border-color: var(--amber); color: #14110a; }
.btn.pass { background: transparent; border-color: var(--line2); color: var(--text); }
.btn.ghost { background: transparent; border-color: var(--line); color: var(--muted); font-size: 15px; padding: 10px 14px; }

.tag {
  font-family: var(--display);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid currentColor;
}

/* ----- top bar ----- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 10px;
}
.brand { display: flex; align-items: baseline; gap: 8px; }
.brand .wordmark { font-family: var(--display); font-weight: 700; font-size: 24px; letter-spacing: 0.04em; }
.brand .dot { color: var(--amber); }
.nav { display: flex; gap: 6px; }
.nav button {
  font-family: var(--display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  font-size: 13px; background: transparent; color: var(--muted);
  border: 1px solid transparent; border-radius: 8px; padding: 6px 10px; cursor: pointer;
}
.nav button[aria-current="true"] { color: var(--text); background: var(--panel2); border-color: var(--line); }
.nav button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 1px; }

/* ----- benchmark hero ----- */
.benchmark {
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 6px;
}
.benchmark .label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.benchmark .org { font-family: var(--display); font-weight: 700; font-size: 26px; line-height: 1.05; margin: 4px 0 2px; }
.benchmark .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }

.bigtotal {
  display: flex; align-items: baseline; justify-content: center; gap: 14px;
  margin: 14px 0 6px;
}
.bigtotal .you, .bigtotal .bench { display: flex; flex-direction: column; align-items: center; }
.bigtotal .k { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.bigtotal .v { font-family: var(--display); font-weight: 700; font-size: 64px; line-height: 0.9; }
.bigtotal .you .v { color: var(--amber); }
.bigtotal .vs { font-family: var(--display); color: var(--faint); font-size: 22px; align-self: center; }

/* ----- seats and passes ----- */
.statusrow { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
.seats { display: flex; gap: 8px; }
.seat {
  width: 30px; height: 30px; border-radius: 8px; border: 1px dashed var(--line2);
  display: grid; place-items: center; color: var(--faint);
  font-family: var(--display); font-weight: 700; font-size: 13px;
  transition: all 160ms var(--ease);
}
.seat.filled { border-style: solid; border-color: var(--amber); color: #14110a; background: var(--amber); }
.passes { display: flex; gap: 6px; align-items: center; }
.pip { width: 11px; height: 11px; border-radius: 50%; border: 1px solid var(--line2); }
.pip.spent { background: var(--red); border-color: var(--red); }
.pip.left { background: var(--cyan); border-color: var(--cyan); }

/* ----- the deal stage ----- */
.stage {
  position: relative;
  flex: 1;
  display: grid;
  place-items: center;
  min-height: 320px;
  margin: 8px 0;
}

/* ----- driver card ----- */
.card {
  width: 100%;
  max-width: 320px;
  background: linear-gradient(180deg, var(--raised), var(--panel2));
  border: 1px solid var(--line2);
  border-radius: 18px;
  padding: 0;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
}
.card .stripe { height: 10px; background: var(--check); }
.card .body { padding: 20px 20px 22px; }
.card .tier { display: inline-flex; align-items: center; gap: 6px; }
.card .driver { font-family: var(--display); font-weight: 700; font-size: 40px; line-height: 0.98; margin: 14px 0 2px; }
.card .year { font-family: var(--display); font-weight: 600; font-size: 22px; color: var(--muted); }
.card .hide {
  margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.card .hide .q { font-family: var(--display); font-weight: 700; font-size: 34px; color: var(--faint); }
.card .hide .k { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); max-width: 150px; text-align: right; }

/* deal animation */
.card.dealing { animation: deal var(--deal-ms) var(--ease); }
@keyframes deal {
  from { opacity: 0; transform: translateY(26px) rotate(-3deg) scale(0.94); }
  to { opacity: 1; transform: none; }
}
.card.leaving { animation: leave 200ms var(--ease) forwards; }
@keyframes leave {
  to { opacity: 0; transform: translateY(-18px) scale(0.96); }
}

/* ----- lineup (your garage), shown the whole deal ----- */
.lineup { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.lseat {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--panel); transition: border-color 160ms var(--ease), background 160ms;
}
.lseat.open { border-style: dashed; }
.lseat.filled { border-color: var(--line2); background: var(--panel2); animation: deal 240ms var(--ease); }
.lseat-n { font-family: var(--display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; color: var(--muted); }
.lseat-open { font-size: 12px; color: var(--faint); }
.lseat-nm { font-family: var(--display); font-weight: 700; font-size: 18px; }
.lseat-tier { font-family: var(--display); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }

/* team tag on the dealt card (tier stays hidden until decided) */
.card .tag.team { color: var(--muted); border-color: var(--line2); font-size: 11px; }
.card.revealed .hide .q { transition: color 160ms; }

/* ----- action bar ----- */
.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 6px 0 8px; }
.actions .btn { padding: 18px; font-size: 21px; }
.hintline { text-align: center; font-size: 12.5px; color: var(--faint); margin: 2px 0 12px; min-height: 16px; }
kbd {
  font-family: var(--body); font-size: 11px; background: var(--panel2);
  border: 1px solid var(--line2); border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; color: var(--muted);
}

/* ----- reveal / result ----- */
.banner {
  border-radius: var(--radius); padding: 18px; text-align: center; margin: 8px 0;
  border: 1px solid var(--line2);
}
.banner .verdict { font-family: var(--display); font-weight: 700; font-size: 40px; line-height: 0.95; }
.banner.victory { background: linear-gradient(180deg, rgba(242,229,0,0.16), var(--panel)); border-color: var(--amber); }
.banner.victory .verdict { color: var(--amber); }
.banner.win { background: linear-gradient(180deg, rgba(55,217,154,0.14), var(--panel)); border-color: var(--green); }
.banner.win .verdict { color: var(--green); }
.banner.miss { background: linear-gradient(180deg, rgba(255,93,108,0.12), var(--panel)); border-color: var(--red); }
.banner.miss .verdict { color: var(--red); }
.banner .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

.revlist { list-style: none; margin: 8px 0; padding: 0; }
.revlist li {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--panel); margin-bottom: 8px;
}
.revlist li.appear { animation: deal 300ms var(--ease); }
.revlist .who { display: flex; flex-direction: column; }
.revlist .who .nm { font-family: var(--display); font-weight: 700; font-size: 19px; }
.revlist .who .yr { font-size: 12px; color: var(--muted); }
.revlist .w { font-family: var(--display); font-weight: 700; font-size: 26px; }

.section-title {
  font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  font-size: 14px; color: var(--muted); margin: 18px 0 8px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }

.dynasty {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px;
}
.dynasty .head { font-size: 13.5px; color: var(--muted); margin-bottom: 10px; }
.dynasty .head b { color: var(--text); }

/* share */
.share-pre {
  font-family: var(--body); white-space: pre-wrap; background: var(--panel2);
  border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px; font-size: 14px; color: var(--text);
  margin: 8px 0;
}

/* ----- stats / distribution ----- */
.statgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 8px 0; }
.statgrid .cell { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.statgrid .cell .v { font-family: var(--display); font-weight: 700; font-size: 30px; }
.statgrid .cell .k { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

.dist { margin: 10px 0; }
.dist .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.dist .bar .lbl { width: 96px; font-family: var(--display); font-weight: 600; text-transform: uppercase; font-size: 12px; color: var(--muted); }
.dist .bar .track { flex: 1; background: var(--panel2); border-radius: 6px; overflow: hidden; height: 22px; }
.dist .bar .fill { height: 100%; display: flex; align-items: center; padding-left: 8px; font-family: var(--display); font-weight: 700; font-size: 13px; color: #14110a; min-width: 24px; }
.dist .bar .fill.victory { background: var(--amber); }
.dist .bar .fill.win { background: var(--green); }
.dist .bar .fill.miss { background: var(--red); }

/* ----- archive list ----- */
.archive-list { list-style: none; margin: 8px 0; padding: 0; }
.archive-list li {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 13px 14px; border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--panel); margin-bottom: 9px; cursor: pointer;
}
.archive-list li:hover { border-color: var(--line2); background: var(--panel2); }
.archive-list .a-org { font-family: var(--display); font-weight: 700; font-size: 19px; }
.archive-list .a-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.archive-list .a-bench { font-family: var(--display); font-weight: 700; font-size: 24px; color: var(--amber); }

/* ----- misc copy ----- */
.lede { color: var(--muted); font-size: 14.5px; margin: 10px 0; }
.foot { margin-top: auto; padding: 14px 0; color: var(--faint); font-size: 11.5px; text-align: center; }
.foot .unverified { color: var(--red); }
.toast {
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
  background: var(--raised); border: 1px solid var(--line2); color: var(--text);
  padding: 10px 16px; border-radius: 999px; font-size: 13px; z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

@media (min-width: 520px) {
  .card { max-width: 340px; }
  .bigtotal .v { font-size: 72px; }
}

/* ===== logo slot ===== */
.logo-slot { align-items: center; gap: 9px; position: relative; }
.brand-badge { height: 30px; width: 30px; border-radius: 7px; display: block; flex: none; }
.brand-logo { height: 30px; width: auto; max-width: 190px; display: block; }
.brand-fallback { display: inline-flex; align-items: baseline; gap: 8px; }

/* ===== head to head reveal ===== */
.vs {
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 14px 8px;
  margin: 6px 0 4px;
}
.vs-tops {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.vs-top { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.vs-top.you { align-items: flex-start; text-align: left; }
.vs-top.them { align-items: flex-end; text-align: right; }
.vs-top .lbl { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.vs-top .tot { font-family: var(--display); font-weight: 700; font-size: 52px; line-height: 0.85; }
.vs-top.you .tot { color: var(--amber); transition: color 200ms; }
.vs-top.them .tot { color: var(--text); }
.vs-top .tot.victory { color: var(--amber); }
.vs-top .tot.win { color: var(--green); }
.vs-top .tot.miss { color: var(--red); }
.vs-x { font-weight: 700; font-size: 14px; color: var(--faint); padding: 0 2px; }

.vs-rows { padding-top: 8px; }
.vs-row {
  display: grid;
  grid-template-columns: 1fr 18px 1fr;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(40, 50, 63, 0.5);
}
.vs-row:last-child { border-bottom: 0; }
.vs-tick { width: 6px; height: 6px; border-radius: 50%; background: var(--line2); margin: 0 auto; }
.vs-row .cell { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
.vs-row .cell.you { justify-content: space-between; }
.vs-row .cell.them { justify-content: space-between; flex-direction: row; }
.vs-row .cell .nm {
  font-family: var(--display); font-weight: 600; font-size: 17px; line-height: 1.05;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.vs-row .cell.them .nm { text-align: right; }
.vs-row .cell .w { font-family: var(--display); font-weight: 700; font-size: 22px; color: var(--muted); font-variant-numeric: tabular-nums; }
.vs-row .cell .w.lead { color: var(--amber2); }
.vs-row .cell.empty { opacity: 0.25; }
.w.appear, .cell.appear { animation: deal 280ms var(--ease); }

/* ===== collapsible locked note ===== */
.locked-note { margin: 14px 0; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--panel); padding: 10px 12px; }
.locked-note summary { cursor: pointer; font-family: var(--display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 13px; color: var(--muted); }
.locked-note summary:hover { color: var(--text); }
.locked-note[open] summary { color: var(--text); }

/* ===== race flags in the reveal ===== */
.flag-host { min-height: 0; }
.raceflag {
  font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  font-size: 34px; text-align: center; padding: 18px 12px; border-radius: var(--radius);
  margin: 4px 0 10px; animation: flagin 220ms var(--ease);
}
.raceflag.out { animation: flagout 240ms var(--ease) forwards; }
.raceflag.green { background: var(--green); color: #06120c; }
.raceflag.checkered { color: var(--text); background: var(--check); background-size: 22px 22px; text-shadow: 0 2px 6px rgba(0,0,0,0.9); }
@keyframes flagin { from { opacity: 0; transform: translateY(-10px) scale(0.96); } to { opacity: 1; transform: none; } }
@keyframes flagout { to { opacity: 0; transform: translateY(-8px) scale(0.98); } }

/* ===== shared seed rating + seam flags ===== */
.pct {
  display: flex; flex-direction: column; gap: 2px;
  background: rgba(63, 216, 226, 0.08);
  border: 1px solid rgba(63, 216, 226, 0.3);
  border-radius: var(--radius-sm);
  padding: 10px 12px; margin: 10px 0;
}
.pct-k { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cyan); }
.pct-v { font-family: var(--display); font-weight: 600; font-size: 17px; color: var(--text); }
.pct.live { border-color: var(--green); }
.pct.live .pct-k { color: var(--green); }

.seam-flag {
  font-size: 12px; color: var(--muted);
  background: var(--panel2);
  border: 1px dashed var(--line2);
  border-radius: var(--radius-sm);
  padding: 9px 12px; margin: 8px 0;
}
.seam-flag::before { content: "seam "; font-family: var(--display); font-weight: 700; color: var(--faint); letter-spacing: 0.08em; }

/* ===== pending (excluded) targets ===== */
.archive-list.pending li.locked {
  cursor: default;
  border-style: dashed;
  background: var(--panel);
  opacity: 0.85;
  align-items: flex-start;
}
.archive-list.pending li.locked:hover { border-color: var(--line); background: var(--panel); }
.archive-list.pending .a-meta { color: var(--faint); white-space: normal; line-height: 1.4; margin-top: 4px; }
.archive-list.pending .lock {
  font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  font-size: 11px; color: var(--faint); border: 1px solid var(--line2); border-radius: 999px;
  padding: 3px 10px; white-space: nowrap; flex: none;
}

/* ===== daily board (shared seed leaderboard) ===== */
.board { margin: 10px 0; }
.board-rows {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius-sm); overflow: hidden;
}
.board-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px; border-bottom: 1px solid var(--line);
}
.board-row:last-child { border-bottom: none; }
.board-k { font-size: 13px; color: var(--muted); }
.board-v { font-family: var(--display); font-weight: 700; font-size: 20px; color: var(--text); }
.board-row.ceiling .board-v { color: var(--amber); }
.board-row.you { background: var(--panel2); }
.board-row.you .board-k { color: var(--text); font-weight: 600; }
.board-row.you .board-v { color: var(--cyan); }
.board-standing { font-size: 13px; color: var(--muted); margin-top: 8px; }

/* ===== ad slot (placeholder, parity with Two Seats) =====
   The 250px footprint is always reserved so neither inventory size shifts the
   layout. Placeholder only: wire GPT or AdSense to #ad-inline-1 in production. */
.band-ad { margin: 20px 0 4px; }
.adslot {
  margin: 0 auto; width: 100%; max-width: 970px; min-height: 250px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px;
  background: var(--panel); border: 1px dashed var(--line2); border-radius: var(--radius);
  text-align: center;
}
.adslot-label {
  font-family: var(--display); font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase; font-weight: 700; color: var(--muted);
}
.adslot-size { font-family: var(--display); font-size: 12px; letter-spacing: 0.08em; color: var(--faint); }
.adslot-size--mobile { display: none; }
@media (max-width: 520px) {
  .band-ad { margin: 16px 0 4px; }
  .adslot { max-width: 300px; }
  .adslot-size--desktop { display: none; }
  .adslot-size--mobile { display: inline; }
}

// schema.js
// The one canonical internal shape the whole game depends on.
// Every adapter must map its source into exactly this shape.
// Game logic and the interface only ever read this shape, never raw data.

// Tier scale, from the dataset _meta. Tier honestly brackets the hidden win value.
const TIER_RANGES = [
  { tier: "LEGEND", min: 13, max: Infinity, label: "13+ wins" },
  { tier: "CHAMPION", min: 7, max: 12, label: "7 to 12" },
  { tier: "RACE WINNER", min: 4, max: 6, label: "4 to 6" },
  { tier: "CONTENDER", min: 1, max: 3, label: "1 to 3" },
  { tier: "FIELD", min: 0, max: 0, label: "0" },
];

const TIER_ORDER = ["LEGEND", "CHAMPION", "RACE WINNER", "CONTENDER", "FIELD"];

const BANDS = ["LEGEND", "HARD", "FAIR", "OPEN"];

// Derive the tier that a real win total falls into. Used to verify the data is honest.
function tierForWins(wins) {
  for (const r of TIER_RANGES) {
    if (wins >= r.min && wins <= r.max) return r.tier;
  }
  return "FIELD";
}

// A stable id for a driver season card.
function cardId(driver, year) {
  return `${year}-${driver}`.toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

// Validate and normalise a canonical payload. Throws on a broken source so a
// bad feed fails loudly instead of showing wrong numbers. Returns flags for
// any total whose tier does not match its wins, so the data swap is a known list.
function validateCanonical(data) {
  const problems = [];
  if (!data || !Array.isArray(data.orgSeasons) || !Array.isArray(data.driverPool)) {
    throw new Error("Lineup data is missing orgSeasons or driverPool.");
  }

  for (const os of data.orgSeasons) {
    for (const key of ["id", "year", "org", "seats", "benchmarkWins", "band", "realRoster"]) {
      if (os[key] === undefined || os[key] === null) {
        throw new Error(`Org season ${os.id || "?"} is missing ${key}.`);
      }
    }
    const rosterSum = os.realRoster.reduce((s, r) => s + (r.wins || 0), 0);
    if (rosterSum !== os.benchmarkWins) {
      problems.push(
        `Org ${os.id}: roster wins sum ${rosterSum} does not equal benchmark ${os.benchmarkWins}.`
      );
    }
    for (const r of os.realRoster) {
      const honest = tierForWins(r.wins);
      if (r.tier && r.tier !== honest) {
        problems.push(`Roster ${os.id} / ${r.driver}: tier ${r.tier} but ${r.wins} wins reads ${honest}.`);
      }
    }
  }

  for (const d of data.driverPool) {
    const honest = tierForWins(d.wins);
    if (d.tier && d.tier !== honest) {
      problems.push(`Pool ${d.driver} ${d.year}: tier ${d.tier} but ${d.wins} wins reads ${honest}.`);
    }
  }

  return { ok: problems.length === 0, problems };
}


/* ===== src/game/rng.js ===== */
// rng.js
// Deterministic seeded randomness. Same seed gives the same sequence everywhere,
// which is what makes the daily a fair shared deal.

// Hash a string to a 32 bit unsigned int (xfnv1a).
function hashString(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

// mulberry32 PRNG. Returns a function giving floats in [0, 1).
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Build a PRNG from any string seed.
function rngFromSeed(seedStr) {
  return mulberry32(hashString(seedStr));
}

// In place style Fisher Yates that returns a new shuffled array. Pure given rng.
function shuffle(arr, rng) {
  const out = arr.slice();
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

// scoring.js
// Pure tally and outcome logic, plus the winnability solver.


const OUTCOME = {
  VICTORY_LANE: "VICTORY_LANE",
  WIN: "WIN",
  MISS: "MISS",
};

// Tally a set of signed driver cards against the org benchmark.
// total >= benchmark + VICTORY_MARGIN -> Victory Lane (you beat the dynasty clearly)
// total >= benchmark                  -> Win (you matched or edged the dynasty)
// total <  benchmark                  -> Miss
function scoreRun(signedCards, orgSeason) {
  const total = signedCards.reduce((s, c) => s + (c.wins || 0), 0);
  const benchmark = orgSeason.benchmarkWins;
  const margin = VICTORY_MARGIN ?? 1;
  let outcome = OUTCOME.MISS;
  if (total >= benchmark + margin) outcome = OUTCOME.VICTORY_LANE;
  else if (total >= benchmark) outcome = OUTCOME.WIN;
  return {
    total,
    benchmark,
    diff: total - benchmark,
    outcome,
    win: outcome !== OUTCOME.MISS,
    victoryLane: outcome === OUTCOME.VICTORY_LANE,
  };
}

// Best score a perfect drafter could reach from an ordered pack, given a seat
// count and a pass budget. Sequential: at each card, sign (uses a seat) or pass
// (uses a pass). The run must end with every seat filled. Returns -Infinity if
// the seats cannot be filled. Used to guarantee a daily is winnable and to test.
function solveMaxAchievable(packWins, seats, passes) {
  const n = packWins.length;
  const memo = new Map();

  function key(i, s, p) {
    return i * 100 + s * 10 + p;
  }

  function best(i, seatsLeft, passesLeft) {
    if (seatsLeft === 0) return 0; // run ends the moment seats fill
    if (i >= n) return -Infinity; // out of cards with seats unfilled
    const k = key(i, seatsLeft, passesLeft);
    if (memo.has(k)) return memo.get(k);

    // Option A: sign this card.
    let signVal = packWins[i] + best(i + 1, seatsLeft - 1, passesLeft);

    // Option B: pass this card, if a pass is available.
    let passVal = -Infinity;
    if (passesLeft > 0) {
      passVal = best(i + 1, seatsLeft, passesLeft - 1);
    }

    const res = Math.max(signVal, passVal);
    memo.set(k, res);
    return res;
  }

  return best(0, seats, passes);
}

// Is a deal winnable? The best achievable score must meet or beat the benchmark.
function isWinnable(packWins, seats, passes, benchmark) {
  return solveMaxAchievable(packWins, seats, passes) >= benchmark;
}

// tiers.js
// Display metadata for tiers. The tier brackets the hidden win value so reading
// tiers is real skill. The exact number stays hidden until the tally.

const TIER_META = {
  LEGEND: { label: "LEGEND", color: "var(--amber)", rank: 5, blurb: "All time. 13 or more wins." },
  CHAMPION: { label: "CHAMPION", color: "var(--cyan)", rank: 4, blurb: "Title weight. 7 to 12 wins." },
  "RACE WINNER": { label: "RACE WINNER", color: "var(--green)", rank: 3, blurb: "Wins races. 4 to 6." },
  CONTENDER: { label: "CONTENDER", color: "var(--text)", rank: 2, blurb: "In the mix. 1 to 3." },
  FIELD: { label: "FIELD", color: "var(--faint)", rank: 1, blurb: "Ran the season. 0 wins." },
};

function tierMeta(tier) {
  return TIER_META[tier] || TIER_META.FIELD;
}


// Difficulty is derived from the wins to beat. A monster season is a Dynasty
// (harder, fewer passes); a strong but catchable season is Beatable.
function difficultyBand(benchmarkWins) {
  return benchmarkWins >= PACK.dynastyWins ? "DYNASTY" : "BEATABLE";
}

const BAND_META = {
  DYNASTY: { label: "DYNASTY", color: "var(--amber)", blurb: "A monster season. You get fewer passes." },
  BEATABLE: { label: "BEATABLE", color: "var(--cyan)", blurb: "Strong, but a sharp garage can top it." },
};

function bandMeta(band) {
  return BAND_META[band] || { label: band, color: "var(--muted)", blurb: "" };
}

// dom.js
// A tiny element helper so views stay readable without a framework.

function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (v === null || v === undefined || v === false) continue;
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k === "text") node.textContent = v;
    else if (k.startsWith("on") && typeof v === "function") {
      node.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k === "dataset") {
      for (const [dk, dv] of Object.entries(v)) node.dataset[dk] = dv;
    } else if (k in node && k !== "list") {
      try { node[k] = v; } catch { node.setAttribute(k, v); }
    } else {
      node.setAttribute(k, v);
    }
  }
  const kids = Array.isArray(children) ? children : [children];
  for (const c of kids) {
    if (c === null || c === undefined || c === false) continue;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}

function clear(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
  return node;
}

function mount(parent, ...nodes) {
  for (const n of nodes) if (n) parent.appendChild(n);
  return parent;
}

// a11y.js
// A polite live region so screen readers follow the deal, plus a reduced motion
// helper. Keyboard handling lives in the controller next to the actions.

let _region = null;

function initAnnouncer() {
  if (typeof document === "undefined") return;
  if (_region) return;
  _region = document.createElement("div");
  _region.className = "sr-only";
  _region.setAttribute("aria-live", "polite");
  _region.setAttribute("aria-atomic", "true");
  document.body.appendChild(_region);
}

function announce(message) {
  if (!_region) initAnnouncer();
  if (!_region) return;
  // Clear then set so repeated identical messages are still read.
  _region.textContent = "";
  window.requestAnimationFrame(() => {
    _region.textContent = message;
  });
}

function prefersReducedMotion() {
  try {
    return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  } catch {
    return false;
  }
}

// sound.js
// Optional sound and haptics. Off by default. Synth tones via WebAudio so there
// are no asset files. Haptics use the Vibration API where supported. Both fail
// silently and never block the game.


let _ctx = null;
let _soundOn = FEATURES.sound;
let _hapticsOn = FEATURES.haptics;

function ctx() {
  if (typeof window === "undefined") return null;
  if (!_ctx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    _ctx = new AC();
  }
  return _ctx;
}

function tone(freq, durMs, type = "sine", gain = 0.05) {
  if (!_soundOn) return;
  const c = ctx();
  if (!c) return;
  try {
    if (c.state === "suspended") c.resume();
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.value = gain;
    osc.connect(g);
    g.connect(c.destination);
    const now = c.currentTime;
    g.gain.setValueAtTime(gain, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + durMs / 1000);
    osc.start(now);
    osc.stop(now + durMs / 1000);
  } catch {
    /* ignore */
  }
}

function buzz(pattern) {
  if (!_hapticsOn) return;
  try {
    if (navigator.vibrate) navigator.vibrate(pattern);
  } catch {
    /* ignore */
  }
}

const sound = {
  setSound(on) { _soundOn = on; },
  setHaptics(on) { _hapticsOn = on; },
  isSoundOn() { return _soundOn; },
  isHapticsOn() { return _hapticsOn; },

  deal() { tone(420, 90, "triangle", 0.04); buzz(8); },
  sign() { tone(620, 70, "square", 0.04); tone(880, 120, "sine", 0.05); buzz(18); },
  pass() { tone(240, 110, "sine", 0.04); buzz(10); },
  win() { tone(660, 120); setTimeout(() => tone(880, 160), 110); buzz([20, 40, 30]); },
  victory() {
    [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 180, "triangle", 0.05), i * 120));
    buzz([30, 50, 30, 50, 60]);
  },
  miss() { tone(200, 220, "sine", 0.04); buzz(40); },
};

// share.js
// The share card, built to be posted. Compact, distinctive, instantly readable.
// A head to head of your draft against the real dynasty, with tier squares as
// the visual and the shared seed percentile as the brag line. No em or en dash.


const TIER_EMOJI = {
  LEGEND: "🟨",
  CHAMPION: "🟦",
  "RACE WINNER": "🟩",
  CONTENDER: "🟧",
  FIELD: "⬛",
};

const OUTCOME_LINE = {
  [OUTCOME.VICTORY_LANE]: "🏁 VICTORY LANE",
  [OUTCOME.WIN]: "✅ WIN",
  [OUTCOME.MISS]: "❌ MISS",
};

function squares(cards) {
  return cards.map((c) => TIER_EMOJI[c.tier] || "⬛").join("");
}

function pad2(n) {
  return String(n).padStart(2, " ");
}

function shortOrg(org) {
  let s = org.replace(/\s*\(.*?\)\s*/g, " ").trim();
  s = s.replace(/\b(Motorsports|Motorsport|Racing|Enterprises|Inc\.?)\b/gi, "").trim();
  return s || org;
}

// The hook line emphasizes the core premise: you built a rival garage to take on
// the real team, not a copy of it.
function premise(result, year, team) {
  if (result.outcome === OUTCOME.VICTORY_LANE) return `🏁 Beat ${year} ${team} with a rival garage`;
  if (result.outcome === OUTCOME.WIN) return `✅ Matched ${year} ${team} with a rival garage`;
  return `❌ Came up short of ${year} ${team}`;
}

// ctx: { dayNo, org, year, result, signed, dynastyRoster, percentile, streak, mode }
function buildShareText(ctx) {
  const { dayNo, org, year, result, signed, dynastyRoster, percentile, streak, mode } = ctx;
  const team = shortOrg(org);

  const lines = [
    mode === "daily" ? `THE LINEUP #${dayNo}` : "THE LINEUP  Archive",
    premise(result, year, team),
    "",
    `YOU  ${pad2(result.total)}  ${squares(signed)}`,
    `THEM ${pad2(result.benchmark)}  ${squares(dynastyRoster)}`,
    "",
  ];

  if (percentile && percentile.lineups > 1) {
    lines.push(percentile.isBest ? "🏆 best possible garage" : `📊 beat ${percentile.beatPct}% of garages`);
  }
  if (mode === "daily" && streak > 0) lines.push(`🔥 streak ${streak}`);
  lines.push("motorsport.com/lineup");

  return lines.join("\n");
}

// Copy to clipboard, with the Web Share sheet on mobile when available.
async function shareOrCopy(text) {
  try {
    if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
      await navigator.share({ text });
      return "shared";
    }
  } catch {
    /* fall through to copy */
  }
  try {
    await navigator.clipboard.writeText(text);
    return "copied";
  } catch {
    return "manual";
  }
}

// reveal.js
// The payoff, run like a race. Green flag, the wins count up driver by driver,
// the real team's total counts up, checkered flag, then the verdict. Your garage
// against the real team, head to head.


const VERDICT = {
  [OUTCOME.VICTORY_LANE]: { cls: "victory", word: "VICTORY LANE" },
  [OUTCOME.WIN]: { cls: "win", word: "WIN" },
  [OUTCOME.MISS]: { cls: "miss", word: "MISS" },
};

function verdictSub(result) {
  if (result.outcome === OUTCOME.VICTORY_LANE) return "Your garage beat the real team.";
  if (result.outcome === OUTCOME.MISS) return "Short of the real team this time.";
  return result.diff === 0 ? "You matched the real team." : `You edged the real team by ${result.diff}.`;
}

// A short, clean team name for the head to head label.
function shortOrg(org) {
  let s = org.replace(/\s*\(.*?\)\s*/g, " ").trim();
  s = s.replace(/\b(Motorsports|Motorsport|Racing|Enterprises|Inc\.?)\b/gi, "").trim();
  return s || org;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

function buildResultView(ctx) {
  const { signed, result, orgSeason, sound, percentile } = ctx;
  const reduced = prefersReducedMotion();

  // The live "versus other players" percentile can resolve after the reveal has
  // rendered (it is an async fetch). We hold a stable slot for it and let the
  // caller push the value in whenever it arrives via setComparison.
  let comparison = ctx.comparison;
  const liveSlot = el("div", { class: "live-slot" });

  const yours = signed.slice().sort((a, b) => b.wins - a.wins);
  const theirs = orgSeason.realRoster.slice().sort((a, b) => b.wins - a.wins);
  const rowCount = Math.max(yours.length, theirs.length);

  const youTot = el("div", { class: "tot num", id: "you-tot", text: "0" });
  const themTot = el("div", { class: "tot num", id: "them-tot", text: "0" });

  const tops = el("div", { class: "vs-tops" }, [
    el("div", { class: "vs-top you" }, [el("div", { class: "lbl", text: "Your garage" }), youTot]),
    el("div", { class: "vs-x display", text: "VS" }),
    el("div", { class: "vs-top them" }, [
      el("div", { class: "lbl", text: `${orgSeason.year} ${shortOrg(orgSeason.org)}` }),
      themTot,
    ]),
  ]);

  const rowRefs = [];
  const rows = [];
  for (let i = 0; i < rowCount; i++) {
    const y = yours[i];
    const t = theirs[i];
    const yW = y ? el("span", { class: "w", text: "??", style: `color:${tierMeta(y.tier).color}` }) : null;
    const tW = t ? el("span", { class: "w", text: "??" }) : null;
    const yCell = el("div", { class: "cell you" + (y ? "" : " empty") }, y
      ? [el("span", { class: "nm", text: y.driver }), yW]
      : [el("span", { class: "nm faint", text: "" })]);
    const tCell = el("div", { class: "cell them" + (t ? "" : " empty") }, t
      ? [tW, el("span", { class: "nm", text: t.driver })]
      : [el("span", { class: "nm faint", text: "" })]);
    rows.push(el("div", { class: "vs-row" }, [yCell, el("div", { class: "vs-tick" }), tCell]));
    rowRefs.push({ y, t, yW, tW });
  }
  const grid = el("div", { class: "vs-rows" }, rows);

  const flagHost = el("div", { class: "flag-host" });
  const bannerHost = el("div", {});
  const celebrateHost = el("div", {});

  const node = el("div", { class: "result" }, [
    flagHost,
    el("div", { class: "vs" }, [tops, grid]),
    bannerHost,
    celebrateHost,
  ]);

  const setYou = (v) => { youTot.textContent = String(v); };
  const setThem = (v) => { themTot.textContent = String(v); };

  const markRow = (r) => {
    if (!r.y || !r.t) return;
    if (r.y.wins > r.t.wins) r.yW.classList.add("lead");
    else if (r.t.wins > r.y.wins) r.tW.classList.add("lead");
  };

  function revealBanner() {
    const v = VERDICT[result.outcome];
    if (node.dataset.banner) return;
    node.dataset.banner = "1";
    youTot.classList.add(v.cls);
    mount(bannerHost, el("div", { class: `banner ${v.cls}`, role: "status" }, [
      el("div", { class: "verdict display", text: v.word }),
      el("div", { class: "sub", text: `${verdictSub(result)} ${result.total} to ${result.benchmark}.` }),
    ]));
    if (sound) {
      if (result.outcome === OUTCOME.VICTORY_LANE) sound.victory();
      else if (result.outcome === OUTCOME.WIN) sound.win();
      else sound.miss();
    }
  }

  function revealCelebrate() {
    if (node.dataset.celebrate) return;
    node.dataset.celebrate = "1";
    const kids = [
      el("div", { class: "section-title", text: "The real team" }),
      el("div", { class: "dynasty" }, [
        el("div", {
          class: "head",
          html: `The real <b>${escapeHtml(orgSeason.year + " " + orgSeason.org)}</b> won <b>${orgSeason.benchmarkWins}</b> races across its cars that season. You beat them with a rival garage.`,
        }),
      ]),
    ];
    if (percentile && percentile.lineups > 1) {
      const pct = percentile.isBest
        ? "Best possible garage from this deal. Nobody could top it."
        : `Your garage beat ${percentile.beatPct} percent of all possible garages from this deal.`;
      kids.push(el("div", { class: "pct" }, [
        el("span", { class: "pct-k", text: "Shared seed rating" }),
        el("span", { class: "pct-v", text: pct }),
      ]));
    }
    kids.push(liveSlot);
    renderLive();
    mount(celebrateHost, el("div", {}, kids));
  }

  // Fill the live slot from the current comparison. Connected shows the live
  // number; not connected (the default until the results service exists) flags it
  // as pending. Safe to call repeatedly.
  function renderLive() {
    clear(liveSlot);
    if (comparison && comparison.connected) {
      mount(liveSlot, el("div", { class: "pct live" }, [
        el("span", { class: "pct-k", text: "Live player percentile" }),
        el("span", { class: "pct-v", text: `You beat ${comparison.beatPct} percent of ${comparison.players} players on today's seed.` }),
      ]));
    } else {
      mount(liveSlot, el("div", { class: "seam-flag", text: "Live percentile versus other players: pending the results service." }));
    }
  }

  // Push a freshly resolved comparison in. If the reveal has already rendered the
  // celebrate section, repaint the slot in place; otherwise the value is picked up
  // when that section renders.
  function setComparison(c) {
    comparison = c;
    if (node.dataset.celebrate) renderLive();
  }

  function finishAll() {
    clear(flagHost);
    rowRefs.forEach((r) => {
      if (r.yW) r.yW.textContent = String(r.y.wins);
      if (r.tW) r.tW.textContent = String(r.t.wins);
      markRow(r);
    });
    setYou(result.total);
    setThem(result.benchmark);
    revealBanner();
    revealCelebrate();
  }

  function showFlag(text, cls) {
    return new Promise((res) => {
      const f = el("div", { class: `raceflag ${cls}`, text });
      clear(flagHost);
      mount(flagHost, f);
      if (sound) sound.deal();
      setTimeout(() => { f.classList.add("out"); setTimeout(() => { clear(flagHost); res(); }, 260); }, 850);
    });
  }

  function play() {
    return new Promise((resolve) => {
      if (reduced) { finishAll(); resolve(); return; }
      let skipped = false;
      let running = 0;
      const wait = (ms) => new Promise((r) => setTimeout(r, ms));
      const cleanup = () => node.removeEventListener("click", onSkip);
      const onSkip = () => { if (skipped) return; skipped = true; finishAll(); cleanup(); resolve(); };
      node.addEventListener("click", onSkip);

      (async () => {
        await showFlag("GREEN FLAG", "green"); if (skipped) return;
        for (const r of rowRefs) {
          if (skipped) return;
          if (r.yW) {
            r.yW.textContent = String(r.y.wins);
            r.yW.parentElement.classList.add("appear");
            running += r.y.wins; setYou(running);
            if (sound) sound.deal();
          }
          await wait(520);
        }
        if (skipped) return;
        let themRun = 0;
        for (const r of rowRefs) {
          if (skipped) return;
          if (r.tW) {
            r.tW.textContent = String(r.t.wins);
            r.tW.parentElement.classList.add("appear");
            themRun += r.t.wins; setThem(themRun);
          }
          if (r.y && r.t) markRow(r);
          await wait(320);
        }
        if (skipped) return;
        await showFlag("CHECKERED FLAG", "checkered"); if (skipped) return;
        revealBanner();
        await wait(320); if (skipped) return;
        revealCelebrate();
        cleanup();
        resolve();
      })();
    });
  }

  return { node, play, setComparison };
}

// jsonAdapter.js
// The adapter that is active today. It loads the verified bootstrap file and
// maps it to the canonical shape. In the inlined embed it reads a global the
// build script writes, so there is no network call.


let _cache = null;

async function loadRaw() {
  // Embed mode: the build inlines the dataset onto window.
  if (typeof window !== "undefined" && window.__LINEUP_DATA__) {
    return window.__LINEUP_DATA__;
  }
  const res = await fetch(JSON_DATA_PATH, { cache: "no-store" });
  if (!res.ok) throw new Error(`Could not load ${JSON_DATA_PATH} (${res.status}).`);
  return res.json();
}

// Map raw bootstrap to canonical. The bootstrap already matches the shape, so
// this is thin on purpose. The Motorsport Stats adapter does its real mapping here.
function toCanonical(raw) {
  const orgSeasons = raw.orgSeasons.map((os) => ({
    id: os.id,
    year: os.year,
    org: os.org,
    seats: os.seats,
    benchmarkWins: os.benchmarkWins,
    band: os.band,
    note: os.note || "",
    // mfr is carried as a badge only. The game never groups or scores by it.
    badge: os.mfr || null,
    realRoster: os.realRoster.map((r) => ({
      driver: r.driver,
      wins: r.wins,
      tier: r.tier,
      id: cardId(r.driver, os.year),
    })),
  }));

  const driverPool = raw.driverPool.map((d) => ({
    id: cardId(d.driver, d.year),
    driver: d.driver,
    year: d.year,
    team: d.team || null,
    wins: d.wins,
    tier: d.tier,
  }));

  return { meta: raw._meta || {}, orgSeasons, driverPool };
}

async function getData() {
  if (_cache) return _cache;
  const raw = await loadRaw();
  const canonical = toCanonical(raw);
  const check = validateCanonical(canonical);
  canonical.integrity = check;
  if (!check.ok) {
    // Do not throw. Surface the list so unverified numbers are a known, finite set.
    console.warn("Lineup data integrity notes:", check.problems);
  }
  _cache = canonical;
  return _cache;
}

const jsonAdapter = {
  name: "json",
  async getOrgSeasons() {
    return (await getData()).orgSeasons;
  },
  async getDriverPool() {
    return (await getData()).driverPool;
  },
  async getMeta() {
    return (await getData()).meta;
  },
  async getIntegrity() {
    return (await getData()).integrity;
  },
};

// motorsportStatsAdapter.js
// Runtime adapter for the Motorsport Stats feed. It maps the feed into the exact
// same canonical shape the JSON adapter returns, so the game does not change.
//
// IMPORTANT for the static GitHub Pages deploy: do not use this adapter in the
// browser. The MSS key (x-api-key) would be exposed in the client bundle. For a
// static site the secure path is build time ingestion: run ingest_mss.py with
// the key held in a gitignored local file. That script calls MSS and writes
// lineup-data.json, which the JSON adapter reads. Win totals are derived from
// real race results (position 1 finishes), never invented.
//
// Use this runtime adapter only in a server or proxy environment where the key
// is injected server side and never reaches the browser. Then flip DATA_SOURCE.


// The shape of one bounded job, sketched so the swap is small and well defined.
async function fetchFromMotorsportStats() {
  throw new Error(
    "Motorsport Stats adapter is not configured. Set DATA_SOURCE to \"json\" or wire this feed."
  );
}

// When the feed fields are known, map them here into the canonical shape.
// Keep this mapping thin and tested. Example skeleton left intact on purpose.
function mapFeed(feed) {
  const orgSeasons = feed.organizations.map((o) => ({
    id: o.id,
    year: o.season,
    org: o.name,
    seats: o.carCount,
    benchmarkWins: o.combinedWins,
    band: o.difficultyBand,
    note: o.summary || "",
    badge: o.manufacturer || null, // badge only
    realRoster: o.drivers.map((d) => ({
      driver: d.fullName,
      wins: d.seasonWins,
      tier: d.tier,
      id: cardId(d.fullName, o.season),
    })),
  }));
  const driverPool = feed.driverSeasons.map((d) => ({
    id: cardId(d.fullName, d.season),
    driver: d.fullName,
    year: d.season,
    wins: d.seasonWins,
    tier: d.tier,
  }));
  const canonical = { meta: { source: "motorsport-stats" }, orgSeasons, driverPool };
  canonical.integrity = validateCanonical(canonical);
  return canonical;
}

const motorsportStatsAdapter = {
  name: "motorsportStats",
  async getOrgSeasons() {
    return mapFeed(await fetchFromMotorsportStats()).orgSeasons;
  },
  async getDriverPool() {
    return mapFeed(await fetchFromMotorsportStats()).driverPool;
  },
  async getMeta() {
    return { source: "motorsport-stats" };
  },
  async getIntegrity() {
    return { ok: true, problems: [] };
  },
};

// adapter.js
// The single seam. The game asks here for data and never knows which source
// answered. Selection is config, not code.


const ADAPTERS = {
  json: jsonAdapter,
  motorsportStats: motorsportStatsAdapter,
};

function getAdapter() {
  const a = ADAPTERS[DATA_SOURCE];

/* ===== src/data/comparison.js ===== */
// comparison.js
// The live "you versus other real players on this daily seed" percentile. That
// number can only come from a results service that aggregates real plays. The
// shared seed means everyone faces the same deal, so the service only needs the
// seed and the player's total to place them.
//
// This seam is fully wired against RESULTS_ENDPOINT. When that config is empty
// (the default today), there is no service: every call reports not connected and
// the UI falls back to the honest shared seed board (see game/leaderboard.js) and
// flags the live number as pending. We never fabricate a field of other players.
//
// To go live: stand up the service, set RESULTS_ENDPOINT in config.js. No other
// change is needed. Expected contract:
//   POST {base}/results   body { seed, total, outcome, dayNo, dataVersion }
//   GET  {base}/percentile?seed=&total=&dataVersion=  -> { beatPct, players }


const NOT_CONNECTED = {
  connected: false,
  reason: "Live player percentile needs the results service.",
};

// The configured base URL, trimmed of a trailing slash, or null when not set.
function base() {
  const url = typeof RESULTS_ENDPOINT === "string" ? RESULTS_ENDPOINT.trim() : "";
  return url ? url.replace(/\/+$/, "") : null;
}

// Submit one finished daily result so the field can aggregate it. A no op (and
// never an error) when the service is not configured. Fire and forget: the caller
// does not wait on it.
async function submitDailyResult(seed, result, meta = {}) {
  const root = base();
  if (!root || !seed || !result) return { connected: false };
  try {
    const res = await fetch(`${root}/results`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        seed,
        total: result.total,
        outcome: result.outcome,
        dayNo: meta.dayNo ?? null,
        dataVersion: DATA_VERSION,
      }),
      keepalive: true,
    });
    return { connected: res.ok };
  } catch {
    return { connected: false };
  }
}

// Fetch the live percentile for this seed: where the player's total ranks among
// the real players who have finished today's shared deal. Returns connected:false
// (so the UI shows the shared seed board instead) on any failure, a bad payload,
// or when the service is not configured. Never throws.
async function getDailyComparison(seed, result) {
  const root = base();
  if (!root || !seed || !result) return NOT_CONNECTED;
  try {
    const url =
      `${root}/percentile` +
      `?seed=${encodeURIComponent(seed)}` +
      `&total=${encodeURIComponent(result.total)}` +
      `&dataVersion=${encodeURIComponent(DATA_VERSION)}`;
    const res = await fetch(url, { headers: { accept: "application/json" } });
    if (!res.ok) return NOT_CONNECTED;
    const data = await res.json();
    if (typeof data.beatPct !== "number" || typeof data.players !== "number") {
      return NOT_CONNECTED;
    }
    return { connected: true, beatPct: data.beatPct, players: data.players };
  } catch {
    return NOT_CONNECTED;
  }
}

// daily.js
// Turns a date into a deterministic org season and pack seed. Same date gives
// every player the same org and the same pack order.


// Epoch the streak day count is measured from (UTC).
const DAY_EPOCH = Date.UTC(2026, 0, 1); // 2026-01-01

// UTC date key, the unit the daily is keyed on.
function dateKeyUTC(date = new Date()) {
  const y = date.getUTCFullYear();
  const m = String(date.getUTCMonth() + 1).padStart(2, "0");
  const d = String(date.getUTCDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

// Whole UTC day number since the epoch. Used for the daily number and streak math.
function dayNumber(date = new Date()) {
  const today = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
  return Math.floor((today - DAY_EPOCH) / 86400000);
}

// Pick the org season for a date. Deterministic across players.
function pickDailyOrgIndex(orgSeasonsLength, dateKey) {
  const h = hashString(`${DATA_VERSION}|org|${dateKey}`);
  return h % orgSeasonsLength;
}

// The seed string the pack builder uses for the day.
function dailySeed(dateKey, orgId) {
  return `${DATA_VERSION}|${dateKey}|${orgId}`;
}

// Resolve the full daily context from a date and a list of servable targets.
// Pass only playable targets here. Returns null orgSeason when none are servable
// so the caller can show the pending state instead of a forced deal.
function resolveDaily(orgSeasons, date = new Date()) {
  const dateKey = dateKeyUTC(date);
  if (!orgSeasons || orgSeasons.length === 0) {
    return { dateKey, dayNo: dayNumber(date), orgSeason: null, seed: null };
  }
  const idx = pickDailyOrgIndex(orgSeasons.length, dateKey);
  const orgSeason = orgSeasons[idx];
  return {
    dateKey,
    dayNo: dayNumber(date),
    orgSeason,
    seed: dailySeed(dateKey, orgSeason.id),
  };
}


/* ===== src/game/deal.js ===== */
// deal.js
// Builds the pack for a run. The player builds a RIVAL garage to beat the target
// team, not the target team against itself.
//
// Rules:
//   Era matched. Only drivers from the target's season are dealt.
//   The target team's own drivers are excluded from the draft pool, except for a
//   single allowed ANCHOR (the strongest driver on the target roster).
//   So a final lineup can contain at most one target roster driver.
//   Obvious scrub filler is removed: the pack is plausible rival drivers.
//
// The anchor is selected before validation, added to the constrained pool, and
// the pool's max achievable wins are checked against the target. Some big
// winning teams leave so few wins for the field that the day is only winnable
// with the anchor, and a few are not winnable at all (those get dropped by the
// eligibility gate in targets.js).


function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

// Passes are the difficulty lever. A bigger winning team is harder, so it gives
// fewer passes; a more beatable team gives more.
function passesForTarget(orgSeason) {
  return orgSeason.benchmarkWins >= PACK.dynastyWins ? PACK.passesDynasty : PACK.passesBeatable;
}

// The rival garage: same season drivers who are NOT on the target roster.
function rivalGarage(orgSeason, pool) {
  const rosterNames = new Set(orgSeason.realRoster.map((r) => r.driver));
  return pool.filter((c) => c.year === orgSeason.year && !rosterNames.has(c.driver));
}

// The single allowed anchor: the strongest driver on the target roster that
// season, as a draftable card tagged with the target team.
function selectAnchor(orgSeason, pool) {
  const best = orgSeason.realRoster.slice().sort((a, b) => b.wins - a.wins)[0];
  if (!best) return null;
  const found = pool.find((c) => c.driver === best.driver && c.year === orgSeason.year);
  return {
    id: found ? found.id : cardId(best.driver, orgSeason.year),
    driver: best.driver,
    year: orgSeason.year,
    team: orgSeason.org,
    wins: best.wins,
    tier: best.tier,
    isAnchor: true,
  };
}

// Best lineup wins reachable from the constrained pool (rivals plus the one
// anchor), choosing the top `seats` drivers. The eligibility ceiling.
function maxAchievable(orgSeason, pool) {
  const wins = rivalGarage(orgSeason, pool).map((c) => c.wins);
  const anchor = selectAnchor(orgSeason, pool);
  if (anchor) wins.push(anchor.wins);
  wins.sort((a, b) => b - a);
  return wins.slice(0, orgSeason.seats).reduce((a, b) => a + b, 0);
}

// Build the run: seats, passes, and the ordered pack drawn from the constrained
// pool (plausible rivals plus the one anchor), validated winnable.
function buildRun(orgSeason, pool, seedStr) {
  const seats = orgSeason.seats;
  const passes = passesForTarget(orgSeason);
  const benchmark = orgSeason.benchmarkWins;

  const rivals = rivalGarage(orgSeason, pool);
  const anchor = selectAnchor(orgSeason, pool);

  // The pack is mostly the real full time field (a mix of win levels), with the
  // anchor and just enough studs injected to keep the day winnable. Because tiers
  // are hidden, the winless full timers are plausible bluffs: the skill is knowing
  // who actually won. This is what separates smart play from guessing.
  const target = clamp(seats + passes + (PACK.extra ?? 0), PACK.minSize, PACK.maxSize);
  const need = Math.max(0, target - (anchor ? 1 : 0));

  const sampled = shuffle(rivals, rngFromSeed(seedStr + "|field")).slice(0, need);
  let cards = (anchor ? [anchor] : []).concat(sampled);

  // Guarantee winnability: while the best seats from the pack fall short of the
  // wins to beat, swap the weakest non anchor card for the strongest rival not in
  // the pack. Eligibility already proved the pool can reach it, so this resolves.
  const topSeatsSum = (cs) =>
    cs.map((c) => c.wins).sort((a, b) => b - a).slice(0, seats).reduce((a, b) => a + b, 0);
  let guard = 0;
  while (topSeatsSum(cards) < benchmark && guard++ < 60) {
    const have = new Set(cards.map((c) => c.driver));
    const strongest = rivals
      .filter((r) => !have.has(r.driver))
      .sort((a, b) => b.wins - a.wins)[0];
    if (!strongest) break;
    let wi = -1, wmin = Infinity;
    cards.forEach((c, idx) => { if (!c.isAnchor && c.wins < wmin) { wmin = c.wins; wi = idx; } });
    if (wi < 0 || strongest.wins <= cards[wi].wins) break;
    cards[wi] = strongest;
  }

  // Plain seeded order. Eligibility already proved the TARGET is winnable (the
  // pool plus anchor can reach the wins to beat) and the pack contains a winnable
  // set, but a given day's order and your limited passes decide whether you can
  // actually assemble it. That order variance is the game and the source of the
  // gap between knowing the drivers and guessing. Passes are the difficulty lever.
  const pack = shuffle(cards, rngFromSeed(`${seedStr}|order`));

  return {
    orgId: orgSeason.id,
    year: orgSeason.year,
    seats,
    passes,
    pack,
    benchmark,
    anchor: anchor ? anchor.driver : null,
    rivalDepth: rivals.length,
  };
}


/* ===== src/game/engine.js ===== */
// engine.js
// The interactive run. Holds the live state of a deal and enforces the rules:
// fill every seat, pass only within budget, never pass into an unfillable spot.
// All scoring math lives in scoring.js. This is the state machine around it.


class Engine {
  constructor(run, orgSeason, { onEvent } = {}) {
    this.run = run;
    this.org = orgSeason;
    this.onEvent = onEvent || (() => {});

    this.index = 0; // pointer into the pack
    this.signed = []; // cards drafted, in order
    this.passesUsed = 0;
    this.status = "dealing"; // "dealing" | "done"
    this.result = null;
  }

  get seats() {
    return this.run.seats;
  }
  get passes() {
    return this.run.passes;
  }
  get pack() {
    return this.run.pack;
  }
  get seatsFilled() {
    return this.signed.length;
  }
  get seatsLeft() {
    return this.seats - this.signed.length;
  }
  get passesLeft() {
    return this.passes - this.passesUsed;
  }
  get cardsLeftAfterCurrent() {
    // cards remaining if we move past the current one
    return this.pack.length - (this.index + 1);
  }

  currentCard() {
    if (this.status === "done") return null;
    return this.pack[this.index] || null;
  }

  canSign() {
    return this.status === "dealing" && this.seatsLeft > 0 && !!this.currentCard();
  }

  // A pass is allowed only if there is budget and enough cards remain afterward
  // to still fill every seat. That keeps every reachable state winnable.
  canPass() {
    if (this.status !== "dealing") return false;
    if (this.passesLeft <= 0) return false;
    if (!this.currentCard()) return false;
    return this.cardsLeftAfterCurrent >= this.seatsLeft;
  }

  sign() {
    if (!this.canSign()) return false;
    const card = this.currentCard();
    this.signed.push(card);
    this.onEvent("sign", { card, seatsFilled: this.seatsFilled, index: this.index });
    this.index += 1;
    this._advance();
    return true;
  }

  pass() {
    if (!this.canPass()) return false;
    const card = this.currentCard();
    this.passesUsed += 1;
    this.onEvent("pass", { card, passesUsed: this.passesUsed, index: this.index });
    this.index += 1;
    this._advance();
    return true;
  }

  _advance() {
    if (this.seatsLeft === 0) {
      this._finish();
      return;
    }
    // Out of cards with seats open should be impossible because canPass guards it,
    // but if it ever happens, finish on what we have rather than hang.
    if (this.index >= this.pack.length) {
      this._finish();
    }
  }

  _finish() {
    this.status = "done";
    this.result = scoreRun(this.signed, this.org);
    this.onEvent("complete", { result: this.result, signed: this.signed });
  }

  // A snapshot the UI can render from without reaching into internals.
  snapshot() {
    return {
      status: this.status,
      index: this.index,
      seats: this.seats,
      seatsFilled: this.seatsFilled,
      seatsLeft: this.seatsLeft,
      passes: this.passes,
      passesUsed: this.passesUsed,
      passesLeft: this.passesLeft,
      signed: this.signed.slice(),
      current: this.currentCard(),
      result: this.result,
      packSize: this.pack.length,
    };
  }
}


/* ===== src/game/targets.js ===== */
// targets.js
// The gate that decides whether a target is fit to serve as a daily.
//
// The player builds a RIVAL garage to beat the target, so eligibility is checked
// against the constrained pool (same season drivers minus the target roster, plus
// one anchor). A target is served only if:
//   1. seats >= 2.
//   2. Wins to beat >= MIN_BENCHMARK (the daily gate).
//   3. There are enough real rivals to fill a draft.
//   4. It is mathematically winnable: the best lineup from the constrained pool
//      (top rivals plus the one anchor) reaches the wins to beat. Big winning
//      teams leave few wins for the field, so some are only winnable with the
//      anchor, and any that still fall short are dropped.


const MIN_SEATS = 2;

// Evaluate one target against the pool. Pure. Returns the verdict and why.
function evaluateTarget(orgSeason, pool) {
  const seats = orgSeason.seats;
  const rivals = rivalGarage(orgSeason, pool);
  const anchor = selectAnchor(orgSeason, pool);
  const best = maxAchievable(orgSeason, pool); // top seats from rivals + one anchor

  const reasons = [];
  if (seats < MIN_SEATS) {
    reasons.push(`Single seat target. A one car team is never served.`);
  }
  if (orgSeason.benchmarkWins < MIN_BENCHMARK) {
    reasons.push(`Below the daily gate. Won only ${orgSeason.benchmarkWins} ${orgSeason.benchmarkWins === 1 ? "race" : "races"} (need ${MIN_BENCHMARK} or more).`);
  }
  // Need enough rivals to fill the seats without the anchor doing all the work.
  if (rivals.length < seats) {
    reasons.push(`Not enough rival ${orgSeason.year} drivers to field a garage. Has ${rivals.length}.`);
  }
  if (best < orgSeason.benchmarkWins) {
    reasons.push(`Unwinnable. The best rival garage${anchor ? " plus the " + anchor.driver + " anchor" : ""} reaches ${best}, short of ${orgSeason.benchmarkWins}.`);
  }

  return {
    id: orgSeason.id,
    playable: reasons.length === 0,
    rivals: rivals.length,
    anchor: anchor ? anchor.driver : null,
    maxAchievable: best,
    seats,
    reason: reasons.join(" "),
  };
}

function getPlayableTargets(orgSeasons, pool) {
  return orgSeasons.filter((os) => evaluateTarget(os, pool).playable);
}

// Excluded targets, each paired with the reason, for the flagged pending list.
function getExcludedTargets(orgSeasons, pool) {
  return orgSeasons
    .map((os) => ({ os, verdict: evaluateTarget(os, pool) }))
    .filter((x) => !x.verdict.playable);
}

// Resolve the daily over servable targets only. The date maps onto the servable
// set, so a non servable target is never the daily. When none are servable the
// orgSeason is null and the caller shows the pending state.
function resolveServableDaily(orgSeasons, pool, date = new Date()) {
  const playable = getPlayableTargets(orgSeasons, pool);
  const daily = resolveDaily(playable, date);
  return { ...daily, servableCount: playable.length };
}


/* ===== src/game/analyze.js ===== */
// analyze.js
// Difficulty measurement and the shared seed percentile. All pure. No real win
// total is ever changed here. This only measures and simulates.


// Every distinct lineup a player could end up with from one ordered deal, under
// the seat and pass rules. Returns the total wins of each reachable lineup.
// Packs are small (<= 8 cards), so a full enumeration is cheap.
function reachableLineups(packWins, seats, passes) {
  const n = packWins.length;
  const totals = [];
  function rec(i, chosen, sum, passesLeft) {
    if (chosen === seats) {
      totals.push(sum);
      return;
    }
    if (i >= n) return; // cannot fill the seats
    // sign card i
    rec(i + 1, chosen + 1, sum + packWins[i], passesLeft);
    // pass card i, only if there is budget and enough cards remain to still fill
    const seatsLeft = seats - chosen;
    const cardsAfter = n - (i + 1);
    if (passesLeft > 0 && cardsAfter >= seatsLeft) {
      rec(i + 1, chosen, sum, passesLeft - 1);
    }
  }
  rec(0, 0, 0, passes);
  return totals;
}

// Where the player's total ranks among every possible lineup from the same deal.
// Everyone faces the same seed, so this is a fair shared comparison with no
// backend. "You beat X percent of possible lineups from this deal."
function draftPercentile(playerTotal, packWins, seats, passes) {
  const totals = reachableLineups(packWins, seats, passes);
  const n = totals.length;
  if (n === 0) return { beatPct: 0, lineups: 0, best: 0, isBest: false };
  const worse = totals.filter((t) => t < playerTotal).length;
  const best = Math.max(...totals);
  return {
    beatPct: Math.round((worse / n) * 100),
    lineups: n,
    best,
    isBest: playerTotal >= best,
  };
}

// Tiers are hidden before a decision, so "smart" models a knowledgeable fan who
// recognizes the real winners by reputation (their win count). Signs a driver
// who won multiple races on sight, passes the lesser names while passes remain,
// and fills forced seats at the end.
const SMART_WIN_THRESHOLD = 3;
function smartDraft(pack, seats, passes) {
  let seatsLeft = seats;
  let passesLeft = passes;
  const signed = [];
  for (let i = 0; i < pack.length && seatsLeft > 0; i++) {
    const card = pack[i];
    const cardsAfter = pack.length - (i + 1);
    const canPass = passesLeft > 0 && cardsAfter >= seatsLeft;
    const sign = !canPass || card.wins >= SMART_WIN_THRESHOLD;
    if (sign) {
      signed.push(card);
      seatsLeft -= 1;
    } else {
      passesLeft -= 1;
    }
  }
  return signed;
}

// A player with no knowledge: signs or passes at random within the rules.
function randomDraft(pack, seats, passes, rnd = Math.random) {
  let seatsLeft = seats;
  let passesLeft = passes;
  const signed = [];
  for (let i = 0; i < pack.length && seatsLeft > 0; i++) {
    const cardsAfter = pack.length - (i + 1);
    const canPass = passesLeft > 0 && cardsAfter >= seatsLeft;
    const sign = !canPass || rnd() < 0.5;
    if (sign) {
      signed.push(pack[i]);
      seatsLeft -= 1;
    } else {
      passesLeft -= 1;
    }
  }
  return signed;
}

// Run a sweep of dailies and report how smart play and random play do. Smart is
// the number to keep near the target band; random is the floor for a clueless
// player. Tune passes (the difficulty lever) to shape these.
function sweep(orgSeasons, pool, days = 120, start = Date.UTC(2026, 0, 1)) {
  const playable = getPlayableTargets(orgSeasons, pool);
  const excluded = orgSeasons.length - playable.length;
  if (playable.length === 0) {
    return {
      days: 0, playableTargets: 0, excludedTargets: excluded,
      smartWinRate: null, randomWinRate: null, victoryLaneRate: null, missRate: null,
      byBand: {}, target: DIFFICULTY, inTargetBand: false,
      note: "No servable targets under the current gate and winnability rules.",
    };
  }

  let smartWins = 0, randomWins = 0, victoryLanes = 0, misses = 0;
  const byBand = {};

  for (let day = 0; day < days; day++) {
    const d = new Date(start + day * 86400000);
    const daily = resolveDaily(playable, d);
    const run = buildRun(daily.orgSeason, pool, daily.seed);

    const smart = scoreRun(smartDraft(run.pack, run.seats, run.passes), daily.orgSeason);
    const random = scoreRun(randomDraft(run.pack, run.seats, run.passes), daily.orgSeason);

    if (smart.win) smartWins += 1;
    if (random.win) randomWins += 1;
    if (smart.outcome === OUTCOME.VICTORY_LANE) victoryLanes += 1;
    if (smart.outcome === OUTCOME.MISS) misses += 1;

    const b = difficultyBand(daily.orgSeason.benchmarkWins);
    byBand[b] = byBand[b] || { n: 0, win: 0, vl: 0 };
    byBand[b].n += 1;
    if (smart.win) byBand[b].win += 1;
    if (smart.victoryLane) byBand[b].vl += 1;
  }

  const smartWinRate = smartWins / days;
  return {
    days,
    playableTargets: playable.length,
    excludedTargets: excluded,
    smartWinRate,
    randomWinRate: randomWins / days,
    victoryLaneRate: victoryLanes / days,
    missRate: misses / days,
    byBand,
    target: DIFFICULTY,
    inTargetBand: smartWinRate >= DIFFICULTY.targetWinRateLow && smartWinRate <= DIFFICULTY.targetWinRateHigh,
  };
}


/* ===== src/game/leaderboard.js ===== */
// leaderboard.js
// The daily board, built on the shared seed. Every player on a date faces the
// exact same deal, so the full field of garages reachable from that deal is
// identical for everyone. That makes a fair, comparable board with no backend:
// we rank the player among every garage the deal allows and report the ceiling.
//
// This is distinct from the live "you versus other real players" percentile,
// which needs the results service (see data/comparison.js). The shared seed board
// ships today; the live percentile drops in on top of it when the service exists.


// Build the board for one deal. packWins/seats/passes describe the deal; pass the
// player's final total as opts.playerTotal to also place them on the board.
// Returns the field size, the ceiling (best reachable total), the floor, the
// median, and (when a player total is given) their rank and percentile.
function dailyBoard(packWins, seats, passes, opts = {}) {
  const totals = reachableLineups(packWins, seats, passes).slice().sort((a, b) => a - b);
  const n = totals.length;
  if (n === 0) {
    return { lineups: 0, best: 0, worst: 0, median: 0, player: null };
  }

  const best = totals[n - 1];
  const worst = totals[0];
  const median = totals[Math.floor((n - 1) / 2)];

  const board = { lineups: n, best, worst, median, player: null };

  if (typeof opts.playerTotal === "number") {
    const total = opts.playerTotal;
    const better = totals.filter((t) => t > total).length; // garages that beat the player
    const worse = totals.filter((t) => t < total).length; // garages the player beat
    board.player = {
      total,
      rank: better + 1, // 1 = top of the board (no garage beats it)
      beatPct: Math.round((worse / n) * 100),
      isBest: total >= best,
    };
  }

  return board;
}
