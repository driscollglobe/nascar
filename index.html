/* tokens.css
   The Two Seats design language. Inherited exactly so The Lineup reads as family. */

:root {
  /* Surfaces */
  --bg: #0d1117;
  --panel: #161c24;
  --panel2: #1d2530;
  --raised: #222c38;

  /* Lines */
  --line: #28323f;
  --line2: #34404f;

  /* Text */
  --text: #eef2f6;
  --muted: #8a97a8;
  --faint: #5c6776;

  /* Accents */
  --amber: #f2e500;
  --amber2: #fff44d;
  --green: #37d99a;
  --red: #ff5d6c;
  --cyan: #3fd8e2;

  /* Type */
  --display: "Barlow Condensed", "Oswald", "Arial Narrow", system-ui, sans-serif;
  --body: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

  /* Geometry */
  --radius: 14px;
  --radius-sm: 9px;
  --gap: 14px;
  --maxw: 460px;

  /* Motion */
  --deal-ms: 420ms;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);

  /* Checkered family mark */
  --check: repeating-conic-gradient(var(--text) 0% 25%, var(--bg) 0% 50%) 0 0 / 12px 12px;
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --deal-ms: 0ms;
  }
}

/* app.css
   Mobile first. The card and the running win total versus the benchmark are the
   hero. Everything else stays quiet. */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
}

#app {
  max-width: var(--maxw);
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 16px env(safe-area-inset-bottom) 16px;
}

/* ----- shared atoms ----- */
.display { font-family: var(--display); text-transform: uppercase; letter-spacing: 0.01em; }
.num { font-family: var(--display); font-weight: 700; font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); }
.faint { color: var(--faint); }
.center { text-align: center; }
.row { display: flex; align-items: center; gap: 10px; }
.spread { justify-content: space-between; }
.stack { display: flex; flex-direction: column; }
.grow { flex: 1; }
.hidden { display: none !important; }

.checker {
  height: 8px;
  background: var(--check);
  border-radius: 2px;
  opacity: 0.9;
}
.checker.thin { height: 6px; opacity: 0.7; }

.btn {
  font-family: var(--display);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  font-size: 19px;
  border: 1px solid var(--line2);
  background: var(--raised);
  color: var(--text);
  border-radius: var(--radius);
  padding: 16px 18px;
  cursor: pointer;
  transition: transform 120ms var(--ease), background 120ms, border-color 120ms, opacity 120ms;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: translateY(1px) scale(0.99); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:focus-visible { outline: 3px solid var(--cyan); outline-offset: 2px; }

.btn.primary {
  background: var(--amber);
  border-color: var(--amber);
  color: #14110a;
}
.btn.primary:hover { background: var(--amber2); }
.btn.sign { background: var(--amber); border-color: var(--amber); color: #14110a; }
.btn.pass { background: transparent; border-color: var(--line2); color: var(--text); }
.btn.ghost { background: transparent; border-color: var(--line); color: var(--muted); font-size: 15px; padding: 10px 14px; }

.tag {
  font-family: var(--display);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid currentColor;
}

/* ----- top bar ----- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 10px;
}
.brand { display: flex; align-items: baseline; gap: 8px; }
.brand .wordmark { font-family: var(--display); font-weight: 700; font-size: 24px; letter-spacing: 0.04em; }
.brand .dot { color: var(--amber); }
.nav { display: flex; gap: 6px; }
.nav button {
  font-family: var(--display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  font-size: 13px; background: transparent; color: var(--muted);
  border: 1px solid transparent; border-radius: 8px; padding: 6px 10px; cursor: pointer;
}
.nav button[aria-current="true"] { color: var(--text); background: var(--panel2); border-color: var(--line); }
.nav button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 1px; }

/* ----- benchmark hero ----- */
.benchmark {
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 6px;
}
.benchmark .label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.benchmark .org { font-family: var(--display); font-weight: 700; font-size: 26px; line-height: 1.05; margin: 4px 0 2px; }
.benchmark .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }

.bigtotal {
  display: flex; align-items: baseline; justify-content: center; gap: 14px;
  margin: 14px 0 6px;
}
.bigtotal .you, .bigtotal .bench { display: flex; flex-direction: column; align-items: center; }
.bigtotal .k { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.bigtotal .v { font-family: var(--display); font-weight: 700; font-size: 64px; line-height: 0.9; }
.bigtotal .you .v { color: var(--amber); }
.bigtotal .vs { font-family: var(--display); color: var(--faint); font-size: 22px; align-self: center; }

/* ----- seats and passes ----- */
.statusrow { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
.seats { display: flex; gap: 8px; }
.seat {
  width: 30px; height: 30px; border-radius: 8px; border: 1px dashed var(--line2);
  display: grid; place-items: center; color: var(--faint);
  font-family: var(--display); font-weight: 700; font-size: 13px;
  transition: all 160ms var(--ease);
}
.seat.filled { border-style: solid; border-color: var(--amber); color: #14110a; background: var(--amber); }
.passes { display: flex; gap: 6px; align-items: center; }
.pip { width: 11px; height: 11px; border-radius: 50%; border: 1px solid var(--line2); }
.pip.spent { background: var(--red); border-color: var(--red); }
.pip.left { background: var(--cyan); border-color: var(--cyan); }

/* ----- the deal stage ----- */
.stage {
  position: relative;
  flex: 1;
  display: grid;
  place-items: center;
  min-height: 320px;
  margin: 8px 0;
}

/* ----- driver card ----- */
.card {
  width: 100%;
  max-width: 320px;
  background: linear-gradient(180deg, var(--raised), var(--panel2));
  border: 1px solid var(--line2);
  border-radius: 18px;
  padding: 0;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
}
.card .stripe { height: 10px; background: var(--check); }
.card .body { padding: 20px 20px 22px; }
.card .tier { display: inline-flex; align-items: center; gap: 6px; }
.card .driver { font-family: var(--display); font-weight: 700; font-size: 40px; line-height: 0.98; margin: 14px 0 2px; }
.card .year { font-family: var(--display); font-weight: 600; font-size: 22px; color: var(--muted); }
.card .hide {
  margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.card .hide .q { font-family: var(--display); font-weight: 700; font-size: 34px; color: var(--faint); }
.card .hide .k { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); max-width: 150px; text-align: right; }

/* deal animation */
.card.dealing { animation: deal var(--deal-ms) var(--ease); }
@keyframes deal {
  from { opacity: 0; transform: translateY(26px) rotate(-3deg) scale(0.94); }
  to { opacity: 1; transform: none; }
}
.card.leaving { animation: leave 200ms var(--ease) forwards; }
@keyframes leave {
  to { opacity: 0; transform: translateY(-18px) scale(0.96); }
}

/* ----- action bar ----- */
.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 6px 0 8px; }
.actions .btn { padding: 18px; font-size: 21px; }
.hintline { text-align: center; font-size: 12.5px; color: var(--faint); margin: 2px 0 12px; min-height: 16px; }
kbd {
  font-family: var(--body); font-size: 11px; background: var(--panel2);
  border: 1px solid var(--line2); border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; color: var(--muted);
}

/* ----- reveal / result ----- */
.banner {
  border-radius: var(--radius); padding: 18px; text-align: center; margin: 8px 0;
  border: 1px solid var(--line2);
}
.banner .verdict { font-family: var(--display); font-weight: 700; font-size: 40px; line-height: 0.95; }
.banner.victory { background: linear-gradient(180deg, rgba(242,229,0,0.16), var(--panel)); border-color: var(--amber); }
.banner.victory .verdict { color: var(--amber); }
.banner.win { background: linear-gradient(180deg, rgba(55,217,154,0.14), var(--panel)); border-color: var(--green); }
.banner.win .verdict { color: var(--green); }
.banner.miss { background: linear-gradient(180deg, rgba(255,93,108,0.12), var(--panel)); border-color: var(--red); }
.banner.miss .verdict { color: var(--red); }
.banner .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

.revlist { list-style: none; margin: 8px 0; padding: 0; }
.revlist li {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--panel); margin-bottom: 8px;
}
.revlist li.appear { animation: deal 300ms var(--ease); }
.revlist .who { display: flex; flex-direction: column; }
.revlist .who .nm { font-family: var(--display); font-weight: 700; font-size: 19px; }
.revlist .who .yr { font-size: 12px; color: var(--muted); }
.revlist .w { font-family: var(--display); font-weight: 700; font-size: 26px; }

.section-title {
  font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  font-size: 14px; color: var(--muted); margin: 18px 0 8px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }

.dynasty {
  background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px;
}
.dynasty .head { font-size: 13.5px; color: var(--muted); margin-bottom: 10px; }
.dynasty .head b { color: var(--text); }

/* share */
.share-pre {
  font-family: var(--body); white-space: pre-wrap; background: var(--panel2);
  border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px; font-size: 14px; color: var(--text);
  margin: 8px 0;
}

/* ----- stats / distribution ----- */
.statgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 8px 0; }
.statgrid .cell { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.statgrid .cell .v { font-family: var(--display); font-weight: 700; font-size: 30px; }
.statgrid .cell .k { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

.dist { margin: 10px 0; }
.dist .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.dist .bar .lbl { width: 96px; font-family: var(--display); font-weight: 600; text-transform: uppercase; font-size: 12px; color: var(--muted); }
.dist .bar .track { flex: 1; background: var(--panel2); border-radius: 6px; overflow: hidden; height: 22px; }
.dist .bar .fill { height: 100%; display: flex; align-items: center; padding-left: 8px; font-family: var(--display); font-weight: 700; font-size: 13px; color: #14110a; min-width: 24px; }
.dist .bar .fill.victory { background: var(--amber); }
.dist .bar .fill.win { background: var(--green); }
.dist .bar .fill.miss { background: var(--red); }

/* ----- archive list ----- */
.archive-list { list-style: none; margin: 8px 0; padding: 0; }
.archive-list li {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 13px 14px; border: 1px solid var(--line); border-radius: var(--radius-sm);
  background: var(--panel); margin-bottom: 9px; cursor: pointer;
}
.archive-list li:hover { border-color: var(--line2); background: var(--panel2); }
.archive-list .a-org { font-family: var(--display); font-weight: 700; font-size: 19px; }
.archive-list .a-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.archive-list .a-bench { font-family: var(--display); font-weight: 700; font-size: 24px; color: var(--amber); }

/* ----- misc copy ----- */
.lede { color: var(--muted); font-size: 14.5px; margin: 10px 0; }
.foot { margin-top: auto; padding: 14px 0; color: var(--faint); font-size: 11.5px; text-align: center; }
.foot .unverified { color: var(--red); }
.toast {
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
  background: var(--raised); border: 1px solid var(--line2); color: var(--text);
  padding: 10px 16px; border-radius: 999px; font-size: 13px; z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

@media (min-width: 520px) {
  .card { max-width: 340px; }
  .bigtotal .v { font-size: 72px; }
}

/* ===== logo slot ===== */
.logo-slot { align-items: center; gap: 8px; position: relative; }
.brand-logo { height: 30px; width: auto; max-width: 190px; display: block; }
.brand-fallback { display: inline-flex; align-items: baseline; gap: 8px; }

/* ===== head to head reveal ===== */
.vs {
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 14px 8px;
  margin: 6px 0 4px;
}
.vs-tops {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.vs-top { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.vs-top.you { align-items: flex-start; text-align: left; }
.vs-top.them { align-items: flex-end; text-align: right; }
.vs-top .lbl { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.vs-top .tot { font-family: var(--display); font-weight: 700; font-size: 52px; line-height: 0.85; }
.vs-top.you .tot { color: var(--amber); transition: color 200ms; }
.vs-top.them .tot { color: var(--text); }
.vs-top .tot.victory { color: var(--amber); }
.vs-top .tot.win { color: var(--green); }
.vs-top .tot.miss { color: var(--red); }
.vs-x { font-weight: 700; font-size: 14px; color: var(--faint); padding: 0 2px; }

.vs-rows { padding-top: 8px; }
.vs-row {
  display: grid;
  grid-template-columns: 1fr 18px 1fr;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(40, 50, 63, 0.5);
}
.vs-row:last-child { border-bottom: 0; }
.vs-tick { width: 6px; height: 6px; border-radius: 50%; background: var(--line2); margin: 0 auto; }
.vs-row .cell { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
.vs-row .cell.you { justify-content: space-between; }
.vs-row .cell.them { justify-content: space-between; flex-direction: row; }
.vs-row .cell .nm {
  font-family: var(--display); font-weight: 600; font-size: 17px; line-height: 1.05;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.vs-row .cell.them .nm { text-align: right; }
.vs-row .cell .w { font-family: var(--display); font-weight: 700; font-size: 22px; color: var(--muted); font-variant-numeric: tabular-nums; }
.vs-row .cell .w.lead { color: var(--amber2); }
.vs-row .cell.empty { opacity: 0.25; }
.w.appear, .cell.appear { animation: deal 280ms var(--ease); }

/* ===== shared seed rating + seam flags ===== */
.pct {
  display: flex; flex-direction: column; gap: 2px;
  background: rgba(63, 216, 226, 0.08);
  border: 1px solid rgba(63, 216, 226, 0.3);
  border-radius: var(--radius-sm);
  padding: 10px 12px; margin: 10px 0;
}
.pct-k { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cyan); }
.pct-v { font-family: var(--display); font-weight: 600; font-size: 17px; color: var(--text); }

.seam-flag {
  font-size: 12px; color: var(--muted);
  background: var(--panel2);
  border: 1px dashed var(--line2);
  border-radius: var(--radius-sm);
  padding: 9px 12px; margin: 8px 0;
}
.seam-flag::before { content: "seam "; font-family: var(--display); font-weight: 700; color: var(--faint); letter-spacing: 0.08em; }

// schema.js
// The one canonical internal shape the whole game depends on.
// Every adapter must map its source into exactly this shape.
// Game logic and the interface only ever read this shape, never raw data.

// Tier scale, from the dataset _meta. Tier honestly brackets the hidden win value.
const TIER_RANGES = [
  { tier: "LEGEND", min: 13, max: Infinity, label: "13+ wins" },
  { tier: "CHAMPION", min: 7, max: 12, label: "7 to 12" },
  { tier: "RACE WINNER", min: 4, max: 6, label: "4 to 6" },
  { tier: "CONTENDER", min: 1, max: 3, label: "1 to 3" },
  { tier: "FIELD", min: 0, max: 0, label: "0" },
];

const TIER_ORDER = ["LEGEND", "CHAMPION", "RACE WINNER", "CONTENDER", "FIELD"];

const BANDS = ["LEGEND", "HARD", "FAIR", "OPEN"];

// Derive the tier that a real win total falls into. Used to verify the data is honest.
function tierForWins(wins) {
  for (const r of TIER_RANGES) {
    if (wins >= r.min && wins <= r.max) return r.tier;
  }
  return "FIELD";
}

// A stable id for a driver season card.
function cardId(driver, year) {
  return `${year}-${driver}`.toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

// Validate and normalise a canonical payload. Throws on a broken source so a
// bad feed fails loudly instead of showing wrong numbers. Returns flags for
// any total whose tier does not match its wins, so the data swap is a known list.
function validateCanonical(data) {
  const problems = [];
  if (!data || !Array.isArray(data.orgSeasons) || !Array.isArray(data.driverPool)) {
    throw new Error("Lineup data is missing orgSeasons or driverPool.");
  }

  for (const os of data.orgSeasons) {
    for (const key of ["id", "year", "org", "seats", "benchmarkWins", "band", "realRoster"]) {
      if (os[key] === undefined || os[key] === null) {
        throw new Error(`Org season ${os.id || "?"} is missing ${key}.`);
      }
    }
    const rosterSum = os.realRoster.reduce((s, r) => s + (r.wins || 0), 0);
    if (rosterSum !== os.benchmarkWins) {
      problems.push(
        `Org ${os.id}: roster wins sum ${rosterSum} does not equal benchmark ${os.benchmarkWins}.`
      );
    }
    for (const r of os.realRoster) {
      const honest = tierForWins(r.wins);
      if (r.tier && r.tier !== honest) {
        problems.push(`Roster ${os.id} / ${r.driver}: tier ${r.tier} but ${r.wins} wins reads ${honest}.`);
      }
    }
  }

  for (const d of data.driverPool) {
    const honest = tierForWins(d.wins);
    if (d.tier && d.tier !== honest) {
      problems.push(`Pool ${d.driver} ${d.year}: tier ${d.tier} but ${d.wins} wins reads ${honest}.`);
    }
  }

  return { ok: problems.length === 0, problems };
}


/* ===== src/game/rng.js ===== */
// rng.js
// Deterministic seeded randomness. Same seed gives the same sequence everywhere,
// which is what makes the daily a fair shared deal.

// Hash a string to a 32 bit unsigned int (xfnv1a).
function hashString(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

// mulberry32 PRNG. Returns a function giving floats in [0, 1).
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Build a PRNG from any string seed.
function rngFromSeed(seedStr) {
  return mulberry32(hashString(seedStr));
}

// In place style Fisher Yates that returns a new shuffled array. Pure given rng.
function shuffle(arr, rng) {
  const out = arr.slice();
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

// scoring.js
// Pure tally and outcome logic, plus the winnability solver.

const OUTCOME = {
  VICTORY_LANE: "VICTORY_LANE",
  WIN: "WIN",
  MISS: "MISS",
};

// Tally a set of signed driver cards against the org benchmark.
// total > benchmark  -> Victory Lane (you beat the real dynasty)
// total === benchmark -> Win (you matched the dynasty)
// total < benchmark  -> Miss
function scoreRun(signedCards, orgSeason) {
  const total = signedCards.reduce((s, c) => s + (c.wins || 0), 0);
  const benchmark = orgSeason.benchmarkWins;
  let outcome = OUTCOME.MISS;
  if (total > benchmark) outcome = OUTCOME.VICTORY_LANE;
  else if (total === benchmark) outcome = OUTCOME.WIN;
  return {
    total,
    benchmark,
    diff: total - benchmark,
    outcome,
    win: outcome !== OUTCOME.MISS,
    victoryLane: outcome === OUTCOME.VICTORY_LANE,
  };
}

// Best score a perfect drafter could reach from an ordered pack, given a seat
// count and a pass budget. Sequential: at each card, sign (uses a seat) or pass
// (uses a pass). The run must end with every seat filled. Returns -Infinity if
// the seats cannot be filled. Used to guarantee a daily is winnable and to test.
function solveMaxAchievable(packWins, seats, passes) {
  const n = packWins.length;
  const memo = new Map();

  function key(i, s, p) {
    return i * 100 + s * 10 + p;
  }

  function best(i, seatsLeft, passesLeft) {
    if (seatsLeft === 0) return 0; // run ends the moment seats fill
    if (i >= n) return -Infinity; // out of cards with seats unfilled
    const k = key(i, seatsLeft, passesLeft);
    if (memo.has(k)) return memo.get(k);

    // Option A: sign this card.
    let signVal = packWins[i] + best(i + 1, seatsLeft - 1, passesLeft);

    // Option B: pass this card, if a pass is available.
    let passVal = -Infinity;
    if (passesLeft > 0) {
      passVal = best(i + 1, seatsLeft, passesLeft - 1);
    }

    const res = Math.max(signVal, passVal);
    memo.set(k, res);
    return res;
  }

  return best(0, seats, passes);
}

// Is a deal winnable? The best achievable score must meet or beat the benchmark.
function isWinnable(packWins, seats, passes, benchmark) {
  return solveMaxAchievable(packWins, seats, passes) >= benchmark;
}

}


/* ===== src/ui/dom.js ===== */
// dom.js
// A tiny element helper so views stay readable without a framework.

function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (v === null || v === undefined || v === false) continue;
    if (k === "class") node.className = v;
    else if (k === "html") node.innerHTML = v;
    else if (k === "text") node.textContent = v;
    else if (k.startsWith("on") && typeof v === "function") {
      node.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k === "dataset") {
      for (const [dk, dv] of Object.entries(v)) node.dataset[dk] = dv;
    } else if (k in node && k !== "list") {
      try { node[k] = v; } catch { node.setAttribute(k, v); }
    } else {
      node.setAttribute(k, v);
    }
  }
  const kids = Array.isArray(children) ? children : [children];
  for (const c of kids) {
    if (c === null || c === undefined || c === false) continue;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}

function clear(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
  return node;
}

function mount(parent, ...nodes) {
  for (const n of nodes) if (n) parent.appendChild(n);
  return parent;
}

// a11y.js
// A polite live region so screen readers follow the deal, plus a reduced motion
// helper. Keyboard handling lives in the controller next to the actions.

let _region = null;

function initAnnouncer() {
  if (typeof document === "undefined") return;
  if (_region) return;
  _region = document.createElement("div");
  _region.className = "sr-only";
  _region.setAttribute("aria-live", "polite");
  _region.setAttribute("aria-atomic", "true");
  document.body.appendChild(_region);
}

function announce(message) {
  if (!_region) initAnnouncer();
  if (!_region) return;
  // Clear then set so repeated identical messages are still read.
  _region.textContent = "";
  window.requestAnimationFrame(() => {
    _region.textContent = message;
  });
}

function prefersReducedMotion() {
  try {
    return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  } catch {
    return false;
  }
}

// sound.js
// Optional sound and haptics. Off by default. Synth tones via WebAudio so there
// are no asset files. Haptics use the Vibration API where supported. Both fail
// silently and never block the game.


let _ctx = null;
let _soundOn = FEATURES.sound;
let _hapticsOn = FEATURES.haptics;

function ctx() {
  if (typeof window === "undefined") return null;
  if (!_ctx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    _ctx = new AC();
  }
  return _ctx;
}

function tone(freq, durMs, type = "sine", gain = 0.05) {
  if (!_soundOn) return;
  const c = ctx();
  if (!c) return;
  try {
    if (c.state === "suspended") c.resume();
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.value = gain;
    osc.connect(g);
    g.connect(c.destination);
    const now = c.currentTime;
    g.gain.setValueAtTime(gain, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + durMs / 1000);
    osc.start(now);
    osc.stop(now + durMs / 1000);
  } catch {
    /* ignore */
  }
}

function buzz(pattern) {
  if (!_hapticsOn) return;
  try {
    if (navigator.vibrate) navigator.vibrate(pattern);
  } catch {
    /* ignore */
  }
}

const sound = {
  setSound(on) { _soundOn = on; },
  setHaptics(on) { _hapticsOn = on; },
  isSoundOn() { return _soundOn; },
  isHapticsOn() { return _hapticsOn; },

  deal() { tone(420, 90, "triangle", 0.04); buzz(8); },
  sign() { tone(620, 70, "square", 0.04); tone(880, 120, "sine", 0.05); buzz(18); },
  pass() { tone(240, 110, "sine", 0.04); buzz(10); },
  win() { tone(660, 120); setTimeout(() => tone(880, 160), 110); buzz([20, 40, 30]); },
  victory() {
    [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 180, "triangle", 0.05), i * 120));
    buzz([30, 50, 30, 50, 60]);
  },
  miss() { tone(200, 220, "sine", 0.04); buzz(40); },
};

// share.js
// The share card, built to be posted. Compact, distinctive, instantly readable.
// A head to head of your draft against the real dynasty, with tier squares as
// the visual and the shared seed percentile as the brag line. No em or en dash.


const TIER_EMOJI = {
  LEGEND: "🟨",
  CHAMPION: "🟦",
  "RACE WINNER": "🟩",
  CONTENDER: "🟧",
  FIELD: "⬛",
};

const OUTCOME_LINE = {
  [OUTCOME.VICTORY_LANE]: "🏁 VICTORY LANE",
  [OUTCOME.WIN]: "✅ WIN",
  [OUTCOME.MISS]: "❌ MISS",
};

function squares(cards) {
  return cards.map((c) => TIER_EMOJI[c.tier] || "⬛").join("");
}

function pad2(n) {
  return String(n).padStart(2, " ");
}

function diffTag(diff) {
  if (diff > 0) return `(+${diff})`;
  if (diff === 0) return "(even)";
  return `(${diff})`;
}

// ctx: { dayNo, org, year, result, signed, dynastyRoster, percentile, streak, mode }
function buildShareText(ctx) {
  const { dayNo, org, year, result, signed, dynastyRoster, percentile, streak, mode } = ctx;

  const title = mode === "daily" ? `THE LINEUP #${dayNo}` : "THE LINEUP  Archive";

  const lines = [
    title,
    `${year} ${org}`,
    `${OUTCOME_LINE[result.outcome]}  ${diffTag(result.diff)}`,
    "",
    `YOU ${pad2(result.total)}  ${squares(signed)}`,
    `DYN ${pad2(result.benchmark)}  ${squares(dynastyRoster)}`,
    "",
  ];

  if (percentile && percentile.lineups > 1) {
    lines.push(percentile.isBest ? "🏆 best possible draft" : `📊 beat ${percentile.beatPct}% of lineups`);
  }
  if (mode === "daily" && streak > 0) {
    lines.push(`🔥 streak ${streak}`);
  }
  lines.push("motorsport.com/lineup");

  return lines.join("\n");
}

// Copy to clipboard, with the Web Share sheet on mobile when available.
async function shareOrCopy(text) {
  try {
    if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
      await navigator.share({ text });
      return "shared";
    }
  } catch {
    /* fall through to copy */
  }
  try {
    await navigator.clipboard.writeText(text);
    return "copied";
  } catch {
    return "manual";
  }
}

// reveal.js
// The payoff. A head to head: your drafted lineup against the real dynasty,
// driver by driver, totals counting up, the dynasty named and celebrated. This
// is where the polish goes.


const VERDICT = {
  [OUTCOME.VICTORY_LANE]: { cls: "victory", word: "VICTORY LANE", sub: "You beat the real dynasty." },
  [OUTCOME.WIN]: { cls: "win", word: "WIN", sub: "You matched the dynasty." },
  [OUTCOME.MISS]: { cls: "miss", word: "MISS", sub: "Short of the dynasty this time." },
};

// A short, clean org name for the head to head label.
function shortOrg(org) {
  let s = org.replace(/\s*\(.*?\)\s*/g, " ").trim();
  s = s.replace(/\b(Motorsports|Motorsport|Racing|Enterprises|Team|Inc\.?)\b/gi, "").trim();
  return s || org;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

// Build the result view. Returns { node, play }. play() runs the animated reveal.
function buildResultView(ctx) {
  const { signed, result, orgSeason, sound, percentile, comparison } = ctx;
  const reduced = prefersReducedMotion();

  const yours = signed.slice().sort((a, b) => b.wins - a.wins);
  const theirs = orgSeason.realRoster.slice().sort((a, b) => b.wins - a.wins);
  const rowCount = Math.max(yours.length, theirs.length);

  // Top scoreboard. Your total counts up, the dynasty target shows at once
  // because you chased it the whole deal.
  const youTot = el("div", { class: "tot num", id: "you-tot", text: "0" });
  const themTot = el("div", { class: "tot num", text: String(result.benchmark) });

  const tops = el("div", { class: "vs-tops" }, [
    el("div", { class: "vs-top you" }, [el("div", { class: "lbl", text: "Your lineup" }), youTot]),
    el("div", { class: "vs-x display", text: "VS" }),
    el("div", { class: "vs-top them" }, [
      el("div", { class: "lbl", text: `${orgSeason.year} ${shortOrg(orgSeason.org)}` }),
      themTot,
    ]),
  ]);

  // Driver by driver rows.
  const rowRefs = [];
  const rows = [];
  for (let i = 0; i < rowCount; i++) {
    const y = yours[i];
    const t = theirs[i];
    const yW = y ? el("span", { class: "w", text: "??", style: `color:${tierMeta(y.tier).color}` }) : null;
    const tW = t ? el("span", { class: "w", text: "??" }) : null;
    const yCell = el("div", { class: "cell you" + (y ? "" : " empty") }, y
      ? [el("span", { class: "nm", text: y.driver }), yW]
      : [el("span", { class: "nm faint", text: "" })]);
    const tCell = el("div", { class: "cell them" + (t ? "" : " empty") }, t
      ? [tW, el("span", { class: "nm", text: t.driver })]
      : [el("span", { class: "nm faint", text: "" })]);
    rows.push(el("div", { class: "vs-row" }, [yCell, el("div", { class: "vs-tick" }), tCell]));
    rowRefs.push({ y, t, yW, tW });
  }
  const grid = el("div", { class: "vs-rows" }, rows);

  const bannerHost = el("div", {});
  const celebrateHost = el("div", {});

  const node = el("div", { class: "result" }, [
    el("div", { class: "vs" }, [tops, grid]),
    bannerHost,
    celebrateHost,
  ]);

  function setYou(v) {
    youTot.textContent = String(v);
  }

  function revealBanner() {
    const v = VERDICT[result.outcome];
    if (node.dataset.banner) return;
    node.dataset.banner = "1";
    youTot.classList.add(v.cls);
    mount(bannerHost, el("div", { class: `banner ${v.cls}`, role: "status" }, [
      el("div", { class: "verdict display", text: v.word }),
      el("div", { class: "sub", text: `${v.sub} ${result.total} to ${result.benchmark}.` }),
    ]));
    if (sound) {
      if (result.outcome === OUTCOME.VICTORY_LANE) sound.victory();
      else if (result.outcome === OUTCOME.WIN) sound.win();
      else sound.miss();
    }
  }

  function revealCelebrate() {
    if (node.dataset.celebrate) return;
    node.dataset.celebrate = "1";
    const kids = [
      el("div", { class: "section-title", text: "The dynasty" }),
      el("div", { class: "dynasty" }, [
        el("div", {
          class: "head",
          html: `The real <b>${escapeHtml(orgSeason.year + " " + orgSeason.org)}</b> won <b>${orgSeason.benchmarkWins}</b> races across its lineup that season. ${escapeHtml(orgSeason.note || "")}`,
        }),
      ]),
    ];

    if (percentile && percentile.lineups > 1) {
      const pct = percentile.isBest
        ? "Best possible draft from this deal. Nobody could top it."
        : `Your draft beat ${percentile.beatPct} percent of all possible lineups from this deal.`;
      kids.push(el("div", { class: "pct" }, [
        el("span", { class: "pct-k", text: "Shared seed rating" }),
        el("span", { class: "pct-v", text: pct }),
      ]));
    }

    // Live player percentile is a flagged seam until the results service exists.
    if (comparison && comparison.connected === false) {
      kids.push(el("div", { class: "seam-flag", text: "Live percentile versus other players: pending the results service." }));
    }

    mount(celebrateHost, el("div", {}, kids));
  }

  function play() {
    return new Promise((resolve) => {
      let i = 0;
      let running = 0;
      let skipped = false;

      const finishAll = () => {
        running = result.total;
        rowRefs.forEach((r) => {
          if (r.yW) r.yW.textContent = String(r.y.wins);
          if (r.tW) r.tW.textContent = String(r.t.wins);
          if (r.y && r.t) markRow(r);
        });
        setYou(running);
        revealBanner();
        revealCelebrate();
        node.removeEventListener("click", onSkip);
        resolve();
      };

      const markRow = (r) => {
        if (!r.y || !r.t) return;
        if (r.y.wins > r.t.wins) r.yW.classList.add("lead");
        else if (r.t.wins > r.y.wins) r.tW.classList.add("lead");
      };

      const onSkip = () => {
        if (skipped) return;
        skipped = true;
        finishAll();
      };

      if (reduced) {
        finishAll();
        return;
      }

      node.addEventListener("click", onSkip);

      // Phase 1: reveal your drivers, counting your total up.
      const stepYou = () => {
        if (skipped) return;
        if (i >= rowRefs.length) {
          setTimeout(stepThem, 260);
          return;
        }
        const r = rowRefs[i];
        if (r.yW) {
          r.yW.textContent = String(r.y.wins);
          r.yW.parentElement.classList.add("appear");
          running += r.y.wins;
          setYou(running);
          if (sound) sound.deal();
        }
        i += 1;
        setTimeout(stepYou, 520);
      };

      // Phase 2: reveal how the real dynasty did it.
      let j = 0;
      const stepThem = () => {
        if (skipped) return;
        if (j >= rowRefs.length) {
          revealBanner();
          setTimeout(() => {
            if (!skipped) revealCelebrate();
            node.removeEventListener("click", onSkip);
            resolve();
          }, 420);
          return;
        }
        const r = rowRefs[j];
        if (r.tW) {
          r.tW.textContent = String(r.t.wins);
          r.tW.parentElement.classList.add("appear");
        }
        if (r.y && r.t) markRow(r);
        j += 1;
        setTimeout(stepThem, 300);
      };

      setTimeout(stepYou, 360);
    });
  }

  return { node, play };
}

// jsonAdapter.js
// The adapter that is active today. It loads the verified bootstrap file and
// maps it to the canonical shape. In the inlined embed it reads a global the
// build script writes, so there is no network call.


let _cache = null;

async function loadRaw() {
  // Embed mode: the build inlines the dataset onto window.
  if (typeof window !== "undefined" && window.__LINEUP_DATA__) {
    return window.__LINEUP_DATA__;
  }
  const res = await fetch(JSON_DATA_PATH, { cache: "no-store" });
  if (!res.ok) throw new Error(`Could not load ${JSON_DATA_PATH} (${res.status}).`);
  return res.json();
}

// Map raw bootstrap to canonical. The bootstrap already matches the shape, so
// this is thin on purpose. The Motorsport Stats adapter does its real mapping here.
function toCanonical(raw) {
  const orgSeasons = raw.orgSeasons.map((os) => ({
    id: os.id,
    year: os.year,
    org: os.org,
    seats: os.seats,
    benchmarkWins: os.benchmarkWins,
    band: os.band,
    note: os.note || "",
    // mfr is carried as a badge only. The game never groups or scores by it.
    badge: os.mfr || null,
    realRoster: os.realRoster.map((r) => ({
      driver: r.driver,
      wins: r.wins,
      tier: r.tier,
      id: cardId(r.driver, os.year),
    })),
  }));

  const driverPool = raw.driverPool.map((d) => ({
    id: cardId(d.driver, d.year),
    driver: d.driver,
    year: d.year,
    wins: d.wins,
    tier: d.tier,
  }));

  return { meta: raw._meta || {}, orgSeasons, driverPool };
}

async function getData() {
  if (_cache) return _cache;
  const raw = await loadRaw();
  const canonical = toCanonical(raw);
  const check = validateCanonical(canonical);
  canonical.integrity = check;
  if (!check.ok) {
    // Do not throw. Surface the list so unverified numbers are a known, finite set.
    console.warn("Lineup data integrity notes:", check.problems);
  }
  _cache = canonical;
  return _cache;
}

// daily.js
// Turns a date into a deterministic org season and pack seed. Same date gives
// every player the same org and the same pack order.


// Epoch the streak day count is measured from (UTC).
const DAY_EPOCH = Date.UTC(2026, 0, 1); // 2026-01-01

// UTC date key, the unit the daily is keyed on.
function dateKeyUTC(date = new Date()) {
  const y = date.getUTCFullYear();
  const m = String(date.getUTCMonth() + 1).padStart(2, "0");
  const d = String(date.getUTCDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

// Whole UTC day number since the epoch. Used for the daily number and streak math.
function dayNumber(date = new Date()) {
  const today = Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
  return Math.floor((today - DAY_EPOCH) / 86400000);
}

// Pick the org season for a date. Deterministic across players.
function pickDailyOrgIndex(orgSeasonsLength, dateKey) {
  const h = hashString(`${DATA_VERSION}|org|${dateKey}`);
  return h % orgSeasonsLength;
}

// The seed string the pack builder uses for the day.
function dailySeed(dateKey, orgId) {
  return `${DATA_VERSION}|${dateKey}|${orgId}`;
}

// Resolve the full daily context from a date and the loaded org seasons.
function resolveDaily(orgSeasons, date = new Date()) {
  const dateKey = dateKeyUTC(date);
  const idx = pickDailyOrgIndex(orgSeasons.length, dateKey);
  const orgSeason = orgSeasons[idx];
  return {
    dateKey,
    dayNo: dayNumber(date),
    orgSeason,
    seed: dailySeed(dateKey, orgSeason.id),
  };
}


/* ===== src/game/deal.js ===== */
// deal.js
// Builds the pack for a run. Pure given an org season, the full pool, and a seed.
//
// Era matched: the pack is drawn only from drivers who raced that same season.
// A 1967 driver can never fill a 2021 seat. The org's real roster is always in
// the pack, so a faithful draft can at least match the benchmark, and the order
// is validated against the solver to keep the deal winnable.
//
// When the same season pool is too thin to offer real choices (only the roster
// is available), the run carries a dataGap flag. The game does not invent
// drivers to fill it. It flags the gap and the verified dataset fills it later.


function passesForBand(band) {
  return PACK.passesByBand[band] ?? PACK.defaultPasses;
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

// Resolve the org's real roster into full pool cards (so they carry id and tier).
function rosterCards(orgSeason, pool) {
  return orgSeason.realRoster.map((r) => {
    const found = pool.find((p) => p.driver === r.driver && p.year === orgSeason.year);
    return (
      found || { id: r.id, driver: r.driver, year: orgSeason.year, wins: r.wins, tier: r.tier }
    );
  });
}

// Build the run: seats, passes, the ordered pack, and a data gap flag.
function buildRun(orgSeason, pool, seedStr) {
  const seats = orgSeason.seats;
  const passes = passesForBand(orgSeason.band);

  const roster = rosterCards(orgSeason, pool);
  const rosterIds = new Set(roster.map((c) => c.id));

  // Era matched: distractors must come from the same season as the target.
  const sameSeason = ERA_MATCHED ? pool.filter((c) => c.year === orgSeason.year) : pool;
  const others = sameSeason.filter((c) => !rosterIds.has(c.id));

  const target = clamp(seats + passes + 2, PACK.minSize, PACK.maxSize);
  const packSize = Math.min(target, roster.length + others.length);
  const distractorCount = Math.max(0, packSize - roster.length);

  const baseRng = rngFromSeed(seedStr + "|distractors");
  const chosenDistractors = shuffle(others, baseRng).slice(0, distractorCount);

  const cards = roster.concat(chosenDistractors);

  // Data gap: there are not enough verified same season drivers to offer a real
  // draft beyond the roster. The deal still runs, honestly flagged.
  const desiredDistractors = target - roster.length;
  const shortfall = Math.max(0, desiredDistractors - chosenDistractors.length);
  const dataGap = shortfall > 0;

  // Deterministic order, validated winnable. Perturb the seed until a winnable
  // order is found. A winnable order always exists because the pack contains the
  // full roster (top seats sum >= benchmark), so this terminates fast.
  let pack = null;
  for (let salt = 0; salt < 64; salt++) {
    const rng = rngFromSeed(`${seedStr}|order|${salt}`);
    const candidate = shuffle(cards, rng);
    if (isWinnable(candidate.map((c) => c.wins), seats, passes, orgSeason.benchmarkWins)) {
      pack = candidate;
      break;
    }
  }
  // Fallback that is guaranteed winnable: best cards first.
  if (!pack) {
    pack = cards.slice().sort((a, b) => b.wins - a.wins);
  }

  return {
    orgId: orgSeason.id,
    year: orgSeason.year,
    seats,
    passes,
    pack,
    benchmark: orgSeason.benchmarkWins,
    dataGap,
    shortfall,
    poolDepth: sameSeason.length, // verified same season drivers available
  };
}


/* ===== src/game/engine.js ===== */
// engine.js
// The interactive run. Holds the live state of a deal and enforces the rules:
// fill every seat, pass only within budget, never pass into an unfillable spot.
// All scoring math lives in scoring.js. This is the state machine around it.


class Engine {
  constructor(run, orgSeason, { onEvent } = {}) {
    this.run = run;
    this.org = orgSeason;
    this.onEvent = onEvent || (() => {});

    this.index = 0; // pointer into the pack
    this.signed = []; // cards drafted, in order
    this.passesUsed = 0;
    this.status = "dealing"; // "dealing" | "done"
    this.result = null;
  }

  get seats() {
    return this.run.seats;
  }
  get passes() {
    return this.run.passes;
  }
  get pack() {
    return this.run.pack;
  }
  get seatsFilled() {
    return this.signed.length;
  }
  get seatsLeft() {
    return this.seats - this.signed.length;
  }
  get passesLeft() {
    return this.passes - this.passesUsed;
  }
  get cardsLeftAfterCurrent() {
    // cards remaining if we move past the current one
    return this.pack.length - (this.index + 1);
  }

  currentCard() {
    if (this.status === "done") return null;
    return this.pack[this.index] || null;
  }

  canSign() {
    return this.status === "dealing" && this.seatsLeft > 0 && !!this.currentCard();
  }

  // A pass is allowed only if there is budget and enough cards remain afterward
  // to still fill every seat. That keeps every reachable state winnable.
  canPass() {
    if (this.status !== "dealing") return false;
    if (this.passesLeft <= 0) return false;
    if (!this.currentCard()) return false;
    return this.cardsLeftAfterCurrent >= this.seatsLeft;
  }

  sign() {
    if (!this.canSign()) return false;
    const card = this.currentCard();
    this.signed.push(card);
    this.onEvent("sign", { card, seatsFilled: this.seatsFilled, index: this.index });
    this.index += 1;
    this._advance();
    return true;
  }

  pass() {
    if (!this.canPass()) return false;
    const card = this.currentCard();
    this.passesUsed += 1;
    this.onEvent("pass", { card, passesUsed: this.passesUsed, index: this.index });
    this.index += 1;
    this._advance();
    return true;
  }

  _advance() {
    if (this.seatsLeft === 0) {
      this._finish();
      return;
    }
    // Out of cards with seats open should be impossible because canPass guards it,
    // but if it ever happens, finish on what we have rather than hang.
    if (this.index >= this.pack.length) {
      this._finish();
    }
  }

  _finish() {
    this.status = "done";
    this.result = scoreRun(this.signed, this.org);
    this.onEvent("complete", { result: this.result, signed: this.signed });
  }

  // A snapshot the UI can render from without reaching into internals.
  snapshot() {
    return {
      status: this.status,
      index: this.index,
      seats: this.seats,
      seatsFilled: this.seatsFilled,
      seatsLeft: this.seatsLeft,
      passes: this.passes,
      passesUsed: this.passesUsed,
      passesLeft: this.passesLeft,
      signed: this.signed.slice(),
      current: this.currentCard(),
      result: this.result,
      packSize: this.pack.length,
    };
  }
}

// analyze.js
// Difficulty measurement and the shared seed percentile. All pure. No real win
// total is ever changed here. This only measures and simulates.


// Every distinct lineup a player could end up with from one ordered deal, under
// the seat and pass rules. Returns the total wins of each reachable lineup.
// Packs are small (<= 8 cards), so a full enumeration is cheap.
function reachableLineups(packWins, seats, passes) {
  const n = packWins.length;
  const totals = [];
  function rec(i, chosen, sum, passesLeft) {
    if (chosen === seats) {
      totals.push(sum);
      return;
    }
    if (i >= n) return; // cannot fill the seats
    // sign card i
    rec(i + 1, chosen + 1, sum + packWins[i], passesLeft);
    // pass card i, only if there is budget and enough cards remain to still fill
    const seatsLeft = seats - chosen;
    const cardsAfter = n - (i + 1);
    if (passesLeft > 0 && cardsAfter >= seatsLeft) {
      rec(i + 1, chosen, sum, passesLeft - 1);
    }
  }
  rec(0, 0, 0, passes);
  return totals;
}

// Where the player's total ranks among every possible lineup from the same deal.
// Everyone faces the same seed, so this is a fair shared comparison with no
// backend. "You beat X percent of possible lineups from this deal."
function draftPercentile(playerTotal, packWins, seats, passes) {
  const totals = reachableLineups(packWins, seats, passes);
  const n = totals.length;
  if (n === 0) return { beatPct: 0, lineups: 0, best: 0, isBest: false };
  const worse = totals.filter((t) => t < playerTotal).length;
  const best = Math.max(...totals);
  return {
    beatPct: Math.round((worse / n) * 100),
    lineups: n,
    best,
    isBest: playerTotal >= best,
  };
}

// A knowledgeable player who reads tiers but does not know the exact wins.
// Signs anyone who wins races (RACE WINNER or better) on sight, passes lower
// tiers while passes remain, and fills forced seats at the end. This models the
// realistic difficulty, which is what the win rate target is about.
function smartDraft(pack, seats, passes) {
  let seatsLeft = seats;
  let passesLeft = passes;
  const signed = [];
  for (let i = 0; i < pack.length && seatsLeft > 0; i++) {
    const card = pack[i];
    const rank = tierMeta(card.tier).rank; // 5 LEGEND down to 1 FIELD
    const cardsAfter = pack.length - (i + 1);
    const canPass = passesLeft > 0 && cardsAfter >= seatsLeft;
    let sign;
    if (!canPass) sign = true; // must fill
    else if (rank >= 3) sign = true; // RACE WINNER or better, take it
    else sign = false; // CONTENDER or FIELD, hold out for better
    if (sign) {
      signed.push(card);
      seatsLeft -= 1;
    } else {
      passesLeft -= 1;
    }
  }
  return signed;
}

// Run a sweep of dailies and report how a smart draft does. This is the number
// to watch while tuning. It reports the honest current figures, including how
// many dailies are degenerate (no real choice) because the same season pool is
// too thin. That is the data dependency made visible.
function sweep(orgSeasons, pool, days = 120, start = Date.UTC(2026, 0, 1)) {
  let wins = 0;
  let victoryLanes = 0;
  let misses = 0;
  let dataGaps = 0;
  let degenerate = 0;
  const byBand = {};

  for (let day = 0; day < days; day++) {
    const d = new Date(start + day * 86400000);
    const daily = resolveDaily(orgSeasons, d);
    const run = buildRun(daily.orgSeason, pool, daily.seed);

    const signed = smartDraft(run.pack, run.seats, run.passes);
    const res = scoreRun(signed, daily.orgSeason);
    const optimal = solveMaxAchievable(run.pack.map((c) => c.wins), run.seats, run.passes);

    if (res.outcome === OUTCOME.VICTORY_LANE) victoryLanes += 1;
    else if (res.outcome === OUTCOME.WIN) wins += 1;
    else misses += 1;

    if (run.dataGap) dataGaps += 1;
    if (run.pack.length <= run.seats) degenerate += 1; // forced deal, no choice

    const b = daily.orgSeason.band;
    byBand[b] = byBand[b] || { n: 0, win: 0, vl: 0 };
    byBand[b].n += 1;
    if (res.win) byBand[b].win += 1;
    if (res.victoryLane) byBand[b].vl += 1;

    void optimal; // measured per daily, surfaced via the per daily path when needed
  }

  const winRate = (wins + victoryLanes) / days;
  return {
    days,
    winRate, // share of dailies a smart draft wins (includes Victory Lanes)
    victoryLaneRate: victoryLanes / days,
    missRate: misses / days,
    dataGapRate: dataGaps / days,
    degenerateRate: degenerate / days,
    byBand,
    target: DIFFICULTY,
    inTargetBand: winRate >= DIFFICULTY.targetWinRateLow && winRate <= DIFFICULTY.targetWinRateHigh,
  };
}

// storage.js
// Career stats, streaks, and the results distribution. Backed by localStorage,
// with an in memory fallback so the embed never breaks if storage is blocked.
// Only the first scored run on a given daily counts, which keeps the streak honest.


const KEY = "lineup:v1";

const _mem = {};
function safeGet(k) {
  try {
    return window.localStorage.getItem(k);
  } catch {
    return _mem[k] ?? null;
  }
}
function safeSet(k, v) {
  try {
    window.localStorage.setItem(k, v);
  } catch {
    _mem[k] = v;
  }
}

function freshStats() {
  return {
    dataVersion: DATA_VERSION,
    totalPlays: 0,
    wins: 0,
    victoryLanes: 0,
    misses: 0,
    currentStreak: 0,
    maxStreak: 0,
    bestDiff: null, // best total minus benchmark across all plays
    bestTotal: 0,
    lastDayNo: null,
    distribution: { VICTORY_LANE: 0, WIN: 0, MISS: 0 },
    daily: {}, // dateKey -> record
  };
}

function getStats() {
  const raw = safeGet(KEY);
  if (!raw) return freshStats();
  try {
    const parsed = JSON.parse(raw);
    return { ...freshStats(), ...parsed };
  } catch {
    return freshStats();
  }
}

function save(stats) {
  safeSet(KEY, JSON.stringify(stats));
}

function hasPlayed(dateKey) {
  return !!getStats().daily[dateKey];
}

function getDailyRecord(dateKey) {
  return getStats().daily[dateKey] || null;
}

// Record a scored daily run. Idempotent per dateKey: a replay does not move the
// streak or the totals. Returns the up to date stats. `extra` carries optional
// fields to remember, like the shared seed draft percentile.
function recordDaily(dateKey, dayNo, result, extra = {}) {
  const stats = getStats();
  if (stats.daily[dateKey]) return stats; // already counted this day

  const win = result.outcome !== OUTCOME.MISS;

  // Streak is consecutive daily wins. A miss or a skipped day resets it.
  if (win) {
    if (stats.lastDayNo !== null && dayNo === stats.lastDayNo + 1 && stats.currentStreak > 0) {
      stats.currentStreak += 1;
    } else {
      stats.currentStreak = 1;
    }
  } else {
    stats.currentStreak = 0;
  }
  stats.lastDayNo = dayNo;
  stats.maxStreak = Math.max(stats.maxStreak, stats.currentStreak);

  stats.totalPlays += 1;
  if (result.outcome === OUTCOME.VICTORY_LANE) stats.victoryLanes += 1;
  if (result.outcome === OUTCOME.WIN) stats.wins += 1;
  if (result.outcome === OUTCOME.MISS) stats.misses += 1;
  stats.distribution[result.outcome] += 1;

  if (stats.bestDiff === null || result.diff > stats.bestDiff) stats.bestDiff = result.diff;
  stats.bestTotal = Math.max(stats.bestTotal, result.total);

  stats.daily[dateKey] = {
    dayNo,
    outcome: result.outcome,
    total: result.total,
    benchmark: result.benchmark,
    diff: result.diff,
    beatPct: extra.beatPct ?? null,
    ts: Date.now(),
  };

  save(stats);
  return stats;
}

// Wins counts Victory Lanes too (a Victory Lane is a win).
function winRate(stats = getStats()) {
  if (stats.totalPlays === 0) return 0;
  return (stats.wins + stats.victoryLanes) / stats.totalPlays;
}

function resetStats() {
  save(freshStats());
}

// analytics.js
// One thin event bus for the moments the audience team measures. Pushes to a
// dataLayer if the host page has one, keeps an in memory log for tests, and is a
// no op everywhere else. The funnel mirrors Two Seats.

const EVENTS = new Set([
  "game_start",
  "deal",
  "sign",
  "pass",
  "tally",
  "result",
  "share",
  "mode_switch",
]);

const _log = [];

function track(event, props = {}) {
  if (!EVENTS.has(event)) {
    console.warn(`Unknown analytics event "${event}".`);
  }
  const payload = { event, ts: Date.now(), ...props };
  _log.push(payload);

  // Hand off to the host page if it exposes a dataLayer (GTM style).
  try {
    if (typeof window !== "undefined") {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ game: "the-lineup", ...payload });
    }
  } catch {
    /* analytics must never break the game */
  }
}

function getEventLog() {
  return _log.slice();
}

function clearEventLog() {
  _log.length = 0;
}


/* ===== src/main.js ===== */
// main.js
// The controller. Loads data through the adapter seam, resolves the daily,
// runs the deal, and routes between home, deal, result, archive, and stats.



const App = {
  root: null,
  data: { orgSeasons: [], pool: [], meta: {}, integrity: { ok: true, problems: [] } },
  screen: "home",
  engine: null,
  runCtx: null,
  keyHandler: null,
};

async function boot() {
  App.root = document.getElementById("app");
  initAnnouncer();
  try {
    const [orgSeasons, pool, meta, integrity] = await Promise.all([
      getOrgSeasons(),
      getDriverPool(),
      getMeta(),
      getIntegrity(),
    ]);
    App.data = { orgSeasons, pool, meta, integrity };
  } catch (err) {
    renderError(err);
    return;
  }
  renderHome();
}

/* ---------------- shared chrome ---------------- */

function topbar(active) {
  const navBtn = (key, label) =>
    el("button", {
      text: label,
      "aria-current": String(active === key),
      onClick: () => {
        if (active === key) return;
        track("mode_switch", { to: key });
        if (key === "home") renderHome();
        else if (key === "archive") renderArchive();
        else if (key === "stats") renderStats();
      },
    });

  return el("header", { class: "topbar" }, [
    brandSlot(),
    el("nav", { class: "nav", "aria-label": "Sections" }, [
      navBtn("home", "Daily"),
      navBtn("archive", "Archive"),
      navBtn("stats", "Stats"),
    ]),
  ]);
}

// Official logo slot. If a logo file exists at LOGO.src it renders here. Until
// then the text wordmark is the placeholder. Drop a file at the path (and rerun
// build.py for the embed) and it swaps in with no code change.
function brandSlot() {
  const wordmark = el("span", { class: "wordmark", text: "THE LINEUP" });
  const dot = el("span", { class: "dot display", text: "●" });
  const fallback = el("span", { class: "brand-fallback" }, [wordmark, dot]);

  const slot = el("div", { class: "brand logo-slot", "data-logo-slot": "motorsport", title: "Logo slot" }, [fallback]);

  // Try the logo image. If it is not there yet, the wordmark stays.
  const img = el("img", {
    class: "brand-logo",
    src: LOGO.src,
    alt: LOGO.alt,
    onLoad: () => {
      fallback.style.display = "none";
      img.style.display = "block";
    },
    onError: () => {
      img.remove();
    },
  });
  img.style.display = "none";
  slot.insertBefore(img, fallback);
  return slot;
}

function footer() {
  const integ = App.data.integrity;
  const kids = [
    el("div", { text: `Real NASCAR data. ${DATA_VERSION}. Bootstrap source, Motorsport Stats to follow.` }),
  ];
  if (integ && !integ.ok) {
    kids.push(
      el("div", { class: "unverified", text: `${integ.problems.length} number(s) to confirm on the data swap.` })
    );
  }
  return el("footer", { class: "foot" }, kids);
}

function setScreen(name, ...children) {
  App.screen = name;
  detachKeys();
  const frag = el("div", { class: "stack grow" }, children);
  clear(App.root);
  mount(App.root, topbar(name === "deal" || name === "result" ? "home" : name), frag, footer());
}

function toast(msg) {
  const t = el("div", { class: "toast", role: "status", text: msg });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

/* ---------------- home / daily ---------------- */

function benchmarkHero(orgSeason, { label = "Wins to beat" } = {}) {
  const band = bandMeta(orgSeason.band);
  return el("section", { class: "benchmark" }, [
    el("div", { class: "label", text: label }),
    el("div", { class: "row spread" }, [
      el("div", {}, [
        el("div", { class: "org", text: `${orgSeason.year} ${orgSeason.org}` }),
      ]),
      el("div", { class: "num", style: "font-size:54px;color:var(--amber);line-height:0.85", text: String(orgSeason.benchmarkWins) }),
    ]),
    el("div", { class: "meta" }, [
      el("span", { class: "tag", style: `color:${band.color}`, text: band.label }),
      el("span", { class: "muted", style: "font-size:12.5px", text: `${orgSeason.seats} ${orgSeason.seats === 1 ? "seat" : "seats"} to fill` }),
    ]),
    orgSeason.note ? el("div", { class: "lede", style: "margin:10px 0 0", text: orgSeason.note }) : null,
  ]);
}

function renderHome() {
  const daily = resolveDaily(App.data.orgSeasons, new Date());
  App.runCtx = null;

  const played = hasPlayed(daily.dateKey);
  const children = [
    el("div", { class: "checker" }),
    el("div", { class: "lede", text: `Daily #${daily.dayNo}. One organization. One pack. Fill the seats and chase the win total. A clean run takes under a minute.` }),
    benchmarkHero(daily.orgSeason),
  ];

  if (!played) {
    children.push(
      el("button", {
        class: "btn primary",
        style: "margin-top:14px",
        text: "Play today",
        onClick: () => startRun(daily.orgSeason, "daily", daily),
      })
    );
  } else {
    const rec = getDailyRecord(daily.dateKey);
    children.push(playedSummary(rec));
    children.push(
      el("div", { class: "actions", style: "margin-top:10px" }, [
        el("button", { class: "btn ghost", text: "Archive", onClick: () => renderArchive() }),
        el("button", { class: "btn ghost", text: "Stats", onClick: () => renderStats() }),
      ])
    );
  }

  setScreen("home", ...children);
  announce(`Today's organization. ${daily.orgSeason.year} ${daily.orgSeason.org}. ${daily.orgSeason.benchmarkWins} wins to beat.`);
}

function playedSummary(rec) {
  const v = {
    [OUTCOME.VICTORY_LANE]: { cls: "victory", word: "Victory Lane" },
    [OUTCOME.WIN]: { cls: "win", word: "Win" },
    [OUTCOME.MISS]: { cls: "miss", word: "Miss" },
  }[rec.outcome];
  const stats = getStats();
  return el("div", {}, [
    el("div", { class: "section-title", text: "Today, done" }),
    el("div", { class: `banner ${v.cls}` }, [
      el("div", { class: "verdict", text: v.word }),
      el("div", { class: "sub", text: `You drafted ${rec.total} against ${rec.benchmark} to beat.` }),
    ]),
    rec.beatPct !== null && rec.beatPct !== undefined
      ? el("div", { class: "pct", style: "margin:8px 0" }, [
          el("span", { class: "pct-k", text: "Shared seed rating" }),
          el("span", { class: "pct-v", text: `Beat ${rec.beatPct} percent of possible lineups.` }),
        ])
      : null,
    el("div", { class: "lede", text: `Streak ${stats.currentStreak}. Come back tomorrow for a new organization.` }),
    distributionBlock(stats),
  ]);
}

/* ---------------- the deal ---------------- */

function startRun(orgSeason, mode, daily) {
  const seed =
    mode === "daily"
      ? daily.seed
      : `archive|${orgSeason.id}|${Math.floor(Math.random() * 1e9)}`;
  const run = buildRun(orgSeason, App.data.pool, seed);

  App.engine = new Engine(run, orgSeason, {
    onEvent: (type, payload) => {
      if (type === "sign") track("sign", { driver: payload.card.driver, tier: payload.card.tier, mode });
      else if (type === "pass") track("pass", { driver: payload.card.driver, mode });
    },
  });
  App.runCtx = { orgSeason, run, mode, daily };

  track("game_start", { org: orgSeason.id, mode, band: orgSeason.band, seats: run.seats });
  track("deal", { org: orgSeason.id, packSize: run.pack.length, passes: run.passes, mode });

  renderDeal();
}

function renderDeal() {
  const eng = App.engine;
  const os = App.runCtx.orgSeason;

  // Hero: org and wins to beat stay visible the whole deal.
  const hero = el("section", { class: "benchmark", style: "padding:12px 14px" }, [
    el("div", { class: "row spread" }, [
      el("div", {}, [
        el("div", { class: "label", text: "Wins to beat" }),
        el("div", { class: "org", style: "font-size:21px", text: `${os.year} ${os.org}` }),
      ]),
      el("div", { class: "num", style: "font-size:46px;color:var(--amber);line-height:0.85", text: String(os.benchmarkWins) }),
    ]),
  ]);

  const seatsRow = el("div", { class: "seats", id: "seatsRow" });
  const passesRow = el("div", { class: "passes", id: "passesRow" });
  const statusRow = el("div", { class: "statusrow" }, [
    el("div", {}, [el("div", { class: "label muted", style: "font-size:11px;letter-spacing:.1em;text-transform:uppercase", text: "Seats" }), seatsRow]),
    el("div", { style: "text-align:right" }, [el("div", { class: "label muted", style: "font-size:11px;letter-spacing:.1em;text-transform:uppercase", text: "Passes left" }), passesRow]),
  ]);

  const stage = el("div", { class: "stage", id: "stage" });

  const signBtn = el("button", { class: "btn sign", id: "signBtn", text: "Sign" });
  const passBtn = el("button", { class: "btn pass", id: "passBtn", text: "Pass" });
  signBtn.addEventListener("click", () => doAction("sign"));
  passBtn.addEventListener("click", () => doAction("pass"));
  const actions = el("div", { class: "actions" }, [signBtn, passBtn]);

  const hint = el("div", { class: "hintline", id: "hint" });

  // Era matched packs draw only from that season. When the verified pool for the
  // year is thin, we flag it honestly rather than pull a driver from another era.
  const gap = App.runCtx.run.dataGap
    ? el("div", { class: "seam-flag", text: `Limited pack. More verified ${os.year} drivers needed to deepen this deal. Era matched, so no cross era fill.` })
    : null;

  setScreen("deal", el("div", { class: "checker thin" }), hero, gap, statusRow, stage, actions, hint);

  attachKeys();
  paintStatus();
  dealCurrentCard(false);
}

function paintStatus() {
  const eng = App.engine;
  const seatsRow = document.getElementById("seatsRow");
  const passesRow = document.getElementById("passesRow");
  clear(seatsRow);
  for (let i = 0; i < eng.seats; i++) {
    mount(seatsRow, seatSlot(i, eng.signed[i]));
  }
  clear(passesRow);
  for (let i = 0; i < eng.passes; i++) {
    const spent = i < eng.passesUsed;
    mount(passesRow, el("span", { class: "pip " + (spent ? "spent" : "left") }));
  }

  const signBtn = document.getElementById("signBtn");
  const passBtn = document.getElementById("passBtn");
  if (signBtn) signBtn.disabled = !eng.canSign();
  if (passBtn) passBtn.disabled = !eng.canPass();

  const hint = document.getElementById("hint");
  if (hint) {
    if (!eng.canPass() && eng.passesLeft <= 0) {
      hint.innerHTML = `No passes left. Fill your seats. <kbd>S</kbd> sign`;
    } else if (!eng.canPass()) {
      hint.innerHTML = `Pass closed. You need every card left to fill the seats. <kbd>S</kbd> sign`;
    } else {
      hint.innerHTML = `<kbd>S</kbd> sign &nbsp; <kbd>P</kbd> pass`;
    }
  }
}

function dealCurrentCard(skipAnim) {
  const eng = App.engine;
  const stage = document.getElementById("stage");
  clear(stage);
  const card = eng.currentCard();
  if (!card) return;
  const node = driverCard(card, { dealing: !skipAnim });
  mount(stage, node);
  if (!skipAnim) sound.deal();
  announce(`Card ${eng.index + 1}. ${card.driver}, ${card.year}. Tier ${card.tier}. ${eng.seatsLeft} ${eng.seatsLeft === 1 ? "seat" : "seats"} open. ${eng.passesLeft} ${eng.passesLeft === 1 ? "pass" : "passes"} left.`);
}

function doAction(kind) {
  const eng = App.engine;
  if (kind === "sign" && !eng.canSign()) return;
  if (kind === "pass" && !eng.canPass()) return;

  if (kind === "sign") sound.sign();
  else sound.pass();

  const stage = document.getElementById("stage");
  const cardNode = stage && stage.querySelector(".card");
  const reduced = prefersReducedMotion();

  const apply = () => {
    if (kind === "sign") {
      const c = eng.currentCard();
      eng.sign();
      announce(`Signed ${c.driver}. ${eng.seatsLeft} ${eng.seatsLeft === 1 ? "seat" : "seats"} left.`);
    } else {
      eng.pass();
      announce(`Passed. ${eng.passesLeft} ${eng.passesLeft === 1 ? "pass" : "passes"} left.`);
    }
    if (eng.status === "done") {
      showResult();
    } else {
      paintStatus();
      dealCurrentCard(false);
    }
  };

  if (reduced || !cardNode) {
    apply();
  } else {
    cardNode.classList.add("leaving");
    setTimeout(apply, 190);
  }
}

/* ---------------- result / reveal ---------------- */

function showResult() {
  const eng = App.engine;
  const { orgSeason, mode, daily } = App.runCtx;
  const result = eng.result;

  track("tally", { org: orgSeason.id, total: result.total, benchmark: result.benchmark, mode });

  // Shared seed rating: where this draft ranks among every possible lineup from
  // the same deal. Honest, computable, no backend.
  const run = App.runCtx.run;
  const percentile = draftPercentile(result.total, run.pack.map((c) => c.wins), run.seats, run.passes);

  let streak = 0;
  if (mode === "daily" && daily) {
    const stats = recordDaily(daily.dateKey, daily.dayNo, result, { beatPct: percentile.beatPct });
    streak = stats.currentStreak;
  } else {
    streak = getStats().currentStreak;
  }

  track("result", { org: orgSeason.id, outcome: result.outcome, diff: result.diff, mode, streak });

  // Live player percentile is a flagged seam until the results service exists.
  const comparison = { connected: false };
  getDailyComparison(daily ? daily.seed : run.orgId, result).then((c) => {
    App.runCtx.comparison = c;
  });

  const { node, play } = buildResultView({
    signed: eng.signed,
    result,
    orgSeason,
    sound,
    percentile,
    comparison,
  });

  const shareCtx = {
    dayNo: daily ? daily.dayNo : null,
    org: orgSeason.org,
    year: orgSeason.year,
    result,
    signed: eng.signed,
    dynastyRoster: orgSeason.realRoster,
    percentile,
    streak,
    mode,
  };

  const actions = el("div", { class: "stack", style: "gap:10px;margin-top:16px" }, [
    el("button", {
      class: "btn primary",
      text: "Share result",
      onClick: async () => {
        const text = buildShareText(shareCtx);
        const how = await shareOrCopy(text);
        track("share", { outcome: result.outcome, how, mode });
        toast(how === "manual" ? "Copy not available. Select the text." : "Copied to share.");
        if (how === "manual") showShareFallback(text);
      },
    }),
    el("div", { class: "actions" }, [
      el("button", { class: "btn ghost", text: "Archive", onClick: () => renderArchive() }),
      el("button", { class: "btn ghost", text: mode === "daily" ? "Daily" : "Home", onClick: () => renderHome() }),
    ]),
    distributionBlock(getStats()),
  ]);

  setScreen("result", el("div", { class: "checker" }), node, actions);
  play();
}

function showShareFallback(text) {
  const host = document.querySelector(".result");
  if (!host) return;
  mount(host, el("pre", { class: "share-pre", text }));
}

/* ---------------- archive ---------------- */

function renderArchive() {
  const seasons = App.data.orgSeasons.slice().sort((a, b) => b.year - a.year);
  const list = el("ul", { class: "archive-list" },
    seasons.map((os) => {
      const band = bandMeta(os.band);
      return el("li", {
        tabindex: "0",
        role: "button",
        "aria-label": `${os.year} ${os.org}. ${os.benchmarkWins} wins to beat. Band ${os.band}.`,
        onClick: () => startRun(os, "archive", null),
        onKeydown: (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); startRun(os, "archive", null); } },
      }, [
        el("div", {}, [
          el("div", { class: "a-org", text: `${os.year} ${os.org}` }),
          el("div", { class: "a-meta" }, [
            el("span", { class: "tag", style: `color:${band.color};font-size:10px`, text: band.label }),
            el("span", { text: ` ${os.seats} ${os.seats === 1 ? "seat" : "seats"}` }),
          ]),
        ]),
        el("div", { class: "a-bench", text: String(os.benchmarkWins) }),
      ]);
    })
  );

  setScreen("archive",
    el("div", { class: "checker thin" }),
    el("div", { class: "section-title", text: "Archive" }),
    el("div", { class: "lede", text: "Any organization season, unlimited, unranked. These runs never touch your streak." }),
    list
  );
}

/* ---------------- stats ---------------- */

function distributionBlock(stats) {
  const d = stats.distribution;
  const max = Math.max(1, d.VICTORY_LANE, d.WIN, d.MISS);
  const bar = (lbl, cls, n) =>
    el("div", { class: "bar" }, [
      el("span", { class: "lbl", text: lbl }),
      el("div", { class: "track" }, [
        el("div", { class: `fill ${cls}`, style: `width:${Math.max(8, (n / max) * 100)}%`, text: String(n) }),
      ]),
    ]);
  return el("div", {}, [
    el("div", { class: "section-title", text: "Results distribution" }),
    el("div", { class: "dist" }, [
      bar("Victory", "victory", d.VICTORY_LANE),
      bar("Win", "win", d.WIN),
      bar("Miss", "miss", d.MISS),
    ]),
  ]);
}

function renderStats() {
  const s = getStats();
  const wr = Math.round(winRate(s) * 100);
  const cell = (v, k) => el("div", { class: "cell" }, [el("div", { class: "v num", text: String(v) }), el("div", { class: "k", text: k })]);

  setScreen("stats",
    el("div", { class: "checker thin" }),
    el("div", { class: "section-title", text: "Career" }),
    el("div", { class: "statgrid" }, [
      cell(s.totalPlays, "Played"),
      cell(`${wr}%`, "Win rate"),
      cell(s.victoryLanes, "Victory Lanes"),
      cell(s.currentStreak, "Streak"),
      cell(s.maxStreak, "Best streak"),
      cell(s.bestDiff === null ? "0" : (s.bestDiff >= 0 ? `+${s.bestDiff}` : s.bestDiff), "Best run"),
    ]),
    distributionBlock(s),
    el("div", { class: "lede", style: "margin-top:14px", text: FEATURES.leaderboard ? "Daily leaderboard is live." : "The daily uses a shared seed, so a daily leaderboard drops in cleanly." })
  );
}

/* ---------------- keyboard ---------------- */

function attachKeys() {
  detachKeys();
  App.keyHandler = (e) => {
    if (App.screen !== "deal") return;
    const k = e.key.toLowerCase();
    if (k === "s" || k === "enter") { e.preventDefault(); doAction("sign"); }
    else if (k === "p" || k === "backspace") { e.preventDefault(); doAction("pass"); }
  };
  document.addEventListener("keydown", App.keyHandler);
}
function detachKeys() {
  if (App.keyHandler) {
    document.removeEventListener("keydown", App.keyHandler);
    App.keyHandler = null;
  }
}

/* ---------------- error ---------------- */

function renderError(err) {
  clear(App.root);
  mount(App.root,
    topbar("home"),
    el("div", { class: "benchmark", style: "margin-top:20px" }, [
      el("div", { class: "org", text: "Data did not load" }),
      el("div", { class: "lede", text: String(err && err.message ? err.message : err) }),
    ])
  );
}

if (typeof window !== "undefined") {
  // Inspection hook for local debugging and automated checks. Off in production.
  // Turns on with the DEBUG config flag or the ?debug=1 query parameter.
  const debugOn = DEBUG || /[?&]debug=1\b/.test(window.location.search);
  if (debugOn) window.__LINEUP_APP__ = App;
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
}


})();
